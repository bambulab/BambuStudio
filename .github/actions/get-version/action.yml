name: Get version
description: Compute BambuStudio version string (V<base>.<commit-count>) from version.inc

outputs:
  ver:
    description: "Version string, e.g. V02.07.00.123"
    value: ${{ steps.compute.outputs.ver }}

runs:
  using: composite
  steps:
    - name: Compute version
      id: compute
      shell: bash
      run: |
        base=$(grep 'set(SLIC3R_VERSION_BASE' version.inc | cut -d '"' -f2)
        count=$(git rev-list --count HEAD 2>/dev/null || echo "0")
        echo "ver=V${base}.${count}" >> "$GITHUB_OUTPUT"
