name: Build Packages

on:
  workflow_dispatch:
  workflow_call:

permissions: read-all
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # GitHub-hosted builds inside distribution containers
  build_container:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-24.04
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Debian trixie .deb
            container: debian:trixie@sha256:4ae67669760b807c19f23902a3fd7c121a6a70cf2ae709035674b23e712e4d62  # trixie
            pkg_cmd: ./BuildLinux.sh -pr
            artifact_suffix: debian-trixie_deb
            artifact_glob: ./build/bambustudio_*.deb

          - name: Fedora 42 .rpm
            container: fedora:42@sha256:7c63468daf71fdc5bda3699cd483b169bb995b5137265d5ffe8f04e2ce87fbb8  # fedora 42
            pkg_cmd: bash scripts/build_rpm.sh
            artifact_suffix: fedora42_rpm
            artifact_glob: ./build/bambustudio-*.rpm

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Bootstrap (Debian)
        if: startsWith(matrix.container, 'debian:trixie')
        run: apt-get update -qq && apt-get install -y sudo git curl git-lfs

      - name: Bootstrap (Fedora)
        if: startsWith(matrix.container, 'fedora:42')
        run: dnf install -y sudo git curl git-lfs

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          lfs: 'true'

      - name: Cache deps
        id: cache-deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: deps/build/destdir
          key: pkg-deps-${{ matrix.artifact_suffix }}-${{ hashFiles('deps/CMakeLists.txt', 'deps/**/*.cmake') }}

      - name: Install build dependencies
        run: sudo ./BuildLinux.sh -ur

      - name: Fix permissions
        run: chown -R "$(id -u):$(id -g)" ./

      - name: Build deps
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: ./BuildLinux.sh -dfr

      - name: Build BambuStudio
        run: |
          ./BuildLinux.sh -sfr
          cd build && ./src/BuildLinuxImage.sh

      - name: Build package
        run: ${{ matrix.pkg_cmd }}

      - name: Get version
        id: ver
        shell: bash
        run: |
          ver=$(grep 'set(SLIC3R_VERSION' version.inc | cut -d '"' -f2)
          echo "ver=V${ver}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_${{ matrix.artifact_suffix }}_${{ steps.ver.outputs.ver }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

  # Self-hosted distro runner builds (AppImage + native package)
  build_selfhosted:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: Ubuntu 22.04 AppImage + .deb
            runner: [self-hosted, pve05-ubuntu22]
            pkg_cmd: ./BuildLinux.sh -pr
            artifact_suffix: ubuntu2204
            artifact_deb: ./build/bambustudio_*.deb

          - name: Ubuntu 24.04 AppImage + .deb
            runner: [self-hosted, pve05-ubuntu24]
            pkg_cmd: ./BuildLinux.sh -pr
            artifact_suffix: ubuntu2404
            artifact_deb: ./build/bambustudio_*.deb

          - name: openSUSE Tumbleweed AppImage + .rpm
            runner: [self-hosted, pve05-opensuse]
            pkg_cmd: bash scripts/build_rpm.sh
            artifact_suffix: opensuse-tumbleweed
            artifact_pkg: ./build/bambustudio-*.rpm

          - name: Arch Linux AppImage + .pkg.tar.zst
            runner: [self-hosted, pve05-arch]
            pkg_cmd: bash scripts/build_pkg_arch.sh
            artifact_suffix: arch
            artifact_pkg: ./build/bambustudio-*.pkg.tar.zst

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          lfs: 'true'

      - name: Cache deps
        id: cache-deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: deps/build/destdir
          key: pkg-deps-${{ matrix.artifact_suffix }}-${{ hashFiles('deps/CMakeLists.txt', 'deps/**/*.cmake') }}

      - name: Install build dependencies
        run: sudo ./BuildLinux.sh -ur

      - name: Fix permissions
        run: sudo chown "$(id -u):$(id -g)" -R ./

      - name: Build deps
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: ./BuildLinux.sh -dr

      - name: Build BambuStudio + AppImage
        run: |
          ./BuildLinux.sh -isr
          ARCH=$(uname -m)
          ver=$(grep 'set(SLIC3R_VERSION' version.inc | cut -d '"' -f2)
          mv -n ./build/BambuStudio_ubu64.AppImage \
            "./build/BambuStudio_${{ matrix.artifact_suffix }}_V${ver}.AppImage" 2>/dev/null || true

      - name: Build package
        run: ${{ matrix.pkg_cmd }}

      - name: Get version
        id: ver
        run: |
          ver=$(grep 'set(SLIC3R_VERSION' version.inc | cut -d '"' -f2)
          echo "ver=V${ver}" >> "$GITHUB_OUTPUT"

      - name: Upload AppImage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_${{ matrix.artifact_suffix }}_appimage_${{ steps.ver.outputs.ver }}
          path: ./build/BambuStudio_${{ matrix.artifact_suffix }}_${{ steps.ver.outputs.ver }}.AppImage
          if-no-files-found: warn
          retention-days: 14

      - name: Upload .deb package
        if: matrix.artifact_deb != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_${{ matrix.artifact_suffix }}_deb_${{ steps.ver.outputs.ver }}
          path: ${{ matrix.artifact_deb }}
          if-no-files-found: warn
          retention-days: 14

      - name: Upload native package
        if: matrix.artifact_pkg != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_${{ matrix.artifact_suffix }}_pkg_${{ steps.ver.outputs.ver }}
          path: ${{ matrix.artifact_pkg }}
          if-no-files-found: warn
          retention-days: 14
