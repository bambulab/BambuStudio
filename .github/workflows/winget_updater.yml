name: Publish to WinGet
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v02.07.00.55)'
        required: true
        type: string

# Automatic release trigger disabled until BenJule.BambuStudio is submitted
# to microsoft/winget-pkgs. Enable by adding:
#   release:
#     types: [released]

permissions: read-all
jobs:
  publish:
    runs-on: windows-2022
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e  # v2
        with:
          identifier: BenJule.BambuStudio
          version: ${{ github.event.release.tag_name || inputs.version }}
          token: ${{ secrets.WINGET_TOKEN }}
          installers-regex: '\.exe$'