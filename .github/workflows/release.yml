name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*-fork.[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 02.07.00.55-fork.1) — leave empty to read from version.inc'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: read-all

jobs:
  prepare:
    name: Determine release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Determine tag
        id: get-tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            ver=$(grep 'set(SLIC3R_VERSION' version.inc | cut -d '"' -f2)
            fork=$(grep 'set(FORK_RELEASE' version.inc | cut -d '"' -f2)
            echo "tag=v${ver}-fork.${fork}" >> "$GITHUB_OUTPUT"
          fi

      - name: Show tag
        run: echo "Releasing ${{ steps.get-tag.outputs.tag }}"

  build:
    name: Build ${{ matrix.os }}
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: ubuntu-24.04
          - os: ubuntu-24.04-arm
          - os: windows-2022
          - os: macos-15-intel
            arch: x86_64
          - os: macos-15
            arch: arm64
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build-deps-only: false
    secrets: inherit


  build_packages:
    name: Build Debian .deb + Fedora .rpm
    needs: [prepare]
    uses: ./.github/workflows/build_packages.yml
    secrets: inherit

  create_release:
    name: Create GitHub Release
    needs: [prepare, build, build_packages]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (needs.build_packages.result == 'success' || needs.build_packages.result == 'failure' || needs.build_packages.result == 'skipped' || needs.build_packages.result == 'cancelled') &&
      (needs.build.result == 'success' || needs.build.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: release-assets/
          merge-multiple: true

      - name: List assets
        run: find release-assets/ -type f | sort

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: release-assets/**

      - name: Generate SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e  # v4.1.0
        with:
          subject-path: release-assets/**
          sbom-format: spdx-json

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          mapfile -d '' ASSETS < <(find release-assets/ -type f -print0)
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "BambuStudio $TAG" \
            --generate-notes \
            "${ASSETS[@]}"
