name: Release
run-name: "Release ${{ github.ref_name || inputs.tag }}"

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*.[0-9]*-dev'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v02.07.00.145-dev) — leave empty to auto-compute'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: read-all

jobs:
  prepare:
    name: Determine release tag
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Compute tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            base=$(grep 'set(SLIC3R_VERSION_BASE' version.inc | cut -d '"' -f2)
            count=$(git rev-list --count HEAD)
            echo "tag=v${base}.${count}-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        if: github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/setup-gpg
        with:
          signing-key: ${{ secrets.GIT_SIGNING_KEY }}
          signing-key-passphrase: ${{ secrets.GIT_SIGNING_KEY_PASSPHRASE }}
          signing-key-id: ${{ secrets.GIT_SIGNING_KEY_ID }}

      - name: Create signed tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git tag -s "$TAG" -m "BambuStudio $TAG"
          git push origin "$TAG"

      - name: Show tag
        run: echo "Releasing ${{ steps.tag.outputs.tag }}"

  build:
    name: Build ${{ matrix.os }}
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: ubuntu-24.04
          - os: ubuntu-24.04-arm
          - os: windows-2022
          - os: macos-15-intel
            arch: x86_64
          - os: macos-15
            arch: arm64
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build-deps-only: false
    secrets: inherit

  build_packages:
    name: Build Debian .deb + Fedora .rpm
    needs: [prepare]
    uses: ./.github/workflows/build_packages.yml
    secrets: inherit

  create_release:
    name: Publish Latest release
    needs: [prepare, build, build_packages]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'failure') &&
      (needs.build_packages.result == 'success' || needs.build_packages.result == 'failure' || needs.build_packages.result == 'skipped')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: List assets
        run: find release-assets/ -type f | sort

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: release-assets/**

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          mapfile -d '' ASSETS < <(find release-assets/ -type f -print0)
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "BambuStudio $TAG" \
            --generate-notes \
            --latest \
            "${ASSETS[@]}"
