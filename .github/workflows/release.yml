name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 2.6.1) — leave empty to read from version.inc'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Determine release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Determine tag
        id: get-tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.version }}" ]]; then
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            ver=$(grep 'set(SLIC3R_VERSION' version.inc | cut -d '"' -f2)
            echo "tag=v${ver}" >> "$GITHUB_OUTPUT"
          fi

      - name: Show tag
        run: echo "Releasing ${{ steps.get-tag.outputs.tag }}"

  build:
    name: Build ${{ matrix.os }}
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: ubuntu-24.04
          - os: ubuntu-24.04-arm
          - os: windows-2025
          - os: macos-15-intel
            arch: x86_64
          - os: macos-15
            arch: arm64
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build-deps-only: false
    secrets: inherit

  build_packages:
    name: Build Debian .deb + Fedora .rpm
    needs: [prepare]
    uses: ./.github/workflows/build_packages.yml
    secrets: inherit

  create_release:
    name: Create GitHub Release
    needs: [prepare, build, build_packages]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets/
          merge-multiple: true

      - name: List assets
        run: find release-assets/ -type f | sort

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          mapfile -d '' ASSETS < <(find release-assets/ -type f -print0)
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "BambuStudio $TAG" \
            --generate-notes \
            "${ASSETS[@]}"
