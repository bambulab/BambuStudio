name: Nightly Pre-Release
run-name: "Nightly #${{ github.run_number }}"

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC every night
  workflow_dispatch: {}   # manual trigger

permissions: read-all

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  # ── 1. Distribution packages (Debian .deb, Fedora .rpm, self-hosted) ──────
  build_packages:
    name: Build distribution packages
    uses: ./.github/workflows/build_packages.yml
    with:
      retention-days: 3
    secrets: inherit

  # ── 2. GitHub-hosted platforms (Ubuntu AppImage, Windows, macOS) ──────────
  build_platforms:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux / Ubuntu 22.04
          - os: ubuntu-24.04
            name: Linux / Ubuntu 24.04
          - os: ubuntu-24.04-arm
            name: Linux / Ubuntu 24.04 ARM
          - os: windows-2022
            name: Windows / Windows 2022
          - os: macos-15-intel
            arch: x86_64
            name: macOS / macOS 15 Intel
          - os: macos-15
            arch: arm64
            name: macOS / macOS 15 ARM
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build-deps-only: false
    secrets: inherit

  # ── 3. Publish — after all builds, requires at least one artifact ─────────
  publish:
    name: Publish nightly pre-release
    needs: [build_packages, build_platforms]
    if: |
      always() &&
      needs.build_packages.result != 'cancelled' &&
      needs.build_platforms.result != 'cancelled'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: master
          fetch-depth: 0

      - name: Compute version tag
        id: ver
        run: |
          base=$(grep 'set(SLIC3R_VERSION_BASE' version.inc | cut -d '"' -f2)
          count=$(git rev-list --count HEAD)
          echo "tag=v${base}.${count}-nightly" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GIT_SIGNING_KEY }}" | \
            gpg --batch --pinentry-mode loopback \
                --passphrase "${{ secrets.GIT_SIGNING_KEY_PASSPHRASE }}" \
                --import
          git config user.signingkey "${{ secrets.GIT_SIGNING_KEY_ID }}"
          git config tag.gpgSign true
          git config user.name "BenJule"
          git config user.email "benjamin.luetker@gmail.com"

      - name: Download all artifacts from this run
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v4
        with:
          path: artifacts/
          merge-multiple: true
        continue-on-error: true

      - name: Check artifact count
        id: check
        run: |
          n=$(find artifacts/ -maxdepth 1 -type f 2>/dev/null | wc -l)
          echo "n=$n" >> "$GITHUB_OUTPUT"
          echo "Found $n artifact(s):"
          find artifacts/ -maxdepth 1 -type f | sort || true

      - name: Attest build provenance
        if: steps.check.outputs.n > 0
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: artifacts/**

      - name: Create signed nightly tag
        if: steps.check.outputs.n > 0
        run: |
          git tag -s "${{ steps.ver.outputs.tag }}" \
            -m "Nightly build ${{ steps.ver.outputs.date }}" \
            HEAD
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Build status summary
        id: summary
        if: steps.check.outputs.n > 0
        run: |
          parts=()
          [[ "${{ needs.build_packages.result }}" == "success" ]] \
            && parts+=("Distribution packages ✅") \
            || parts+=("Distribution packages ⚠️ ${{ needs.build_packages.result }}")
          [[ "${{ needs.build_platforms.result }}" == "success" ]] \
            && parts+=("GitHub-hosted platforms ✅") \
            || parts+=("GitHub-hosted platforms ⚠️ ${{ needs.build_platforms.result }}")
          printf '%s\n' "${parts[@]}" > /tmp/status.txt
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/status.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish nightly pre-release
        if: steps.check.outputs.n > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -d '' FILES < <(find artifacts/ -maxdepth 1 -type f -print0 | sort -z)
          printf 'Automatic nightly build from commit [`%s`](https://github.com/%s/commit/%s).\n\n%s\n' \
            "${GITHUB_SHA:0:7}" \
            "${{ github.repository }}" \
            "${{ github.sha }}" \
            "${{ steps.summary.outputs.notes }}" > /tmp/release-notes.md
          gh release create "${{ steps.ver.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "BambuStudio ${{ steps.ver.outputs.tag }} — ${{ steps.ver.outputs.date }}" \
            --notes-file /tmp/release-notes.md \
            --prerelease \
            "${FILES[@]}"
