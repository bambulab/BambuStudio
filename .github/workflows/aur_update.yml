name: AUR Update

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.6.1)'
        required: false
        type: string

permissions: read-all
jobs:
  aur-update:
    name: Update AUR PKGBUILD
    runs-on: ubuntu-24.04

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Get release asset checksums
        id: checksums
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          VER="${TAG#v}"
          UPSTREAM_VER="${VER%-fork.*}"    # strip fork suffix for filename
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          URL=""
          # Try our naming patterns (filenames use upstream version, not fork tag)
          for PATTERN in \
            "Bambu_Studio_ubuntu-24.04_V${UPSTREAM_VER}.AppImage" \
            "Bambu_Studio_ubuntu-22.04_V${UPSTREAM_VER}.AppImage" \
            "BambuStudio_linux_amd64_${TAG}.AppImage"; do
            CANDIDATE="${BASE}/${PATTERN}"
            if curl -sIf "$CANDIDATE" >/dev/null 2>&1; then
              URL="$CANDIDATE"
              break
            fi
          done
          if [[ -z "$URL" ]]; then
            echo "::error::No AppImage asset found for tag $TAG"
            exit 1
          fi
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Write PKGBUILD
        run: |
          cat > PKGBUILD << 'PKGBUILD_EOF'
          # Maintainer: BenJule <benjamin.luetker@gmail.com>
          pkgname=bambu-studio-bin
          pkgver=PKGVER_PLACEHOLDER
          pkgrel=1
          pkgdesc="BambuStudio slicer for Bambu Lab 3D printers"
          arch=('x86_64')
          url="https://github.com/BenJule/BambuStudio"
          license=('AGPL3')
          provides=('bambu-studio')
          conflicts=('bambu-studio')
          depends=('gtk3' 'glib2' 'glibc' 'libsecret' 'webkit2gtk')
          source=("BambuStudio.AppImage::URL_PLACEHOLDER")
          sha256sums=('SHA256_PLACEHOLDER')
          package() {
            install -Dm755 "$srcdir/BambuStudio.AppImage" "$pkgdir/usr/bin/bambu-studio"
          }
          PKGBUILD_EOF
          PKGVER="${{ steps.version.outputs.version }}"
          PKGVER="${PKGVER//-/.}"   # AUR pkgver: no hyphens allowed → 02.07.00.55.fork.1
          sed -i \
            -e "s|PKGVER_PLACEHOLDER|${PKGVER}|g" \
            -e "s|URL_PLACEHOLDER|${{ steps.checksums.outputs.url }}|g" \
            -e "s|SHA256_PLACEHOLDER|${{ steps.checksums.outputs.sha256 }}|g" \
            PKGBUILD
          cat PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7  # v4.1.3
        with:
          pkgname: bambu-studio-bin
          pkgbuild: ./PKGBUILD
          commit_username: ${{ github.repository_owner }}
          commit_email: ${{ github.repository_owner }}@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "update to v${{ steps.version.outputs.version }}"
