name: clang-format Check
run-name: "Format check — PR #${{ github.event.pull_request.number }}"

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**/*.cpp'
      - 'src/**/*.hpp'
      - 'src/**/*.h'
      - 'src/**/*.c'
  workflow_dispatch:

permissions: read-all
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    name: Check formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-format-18
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format

      - name: Run clang-format on changed lines
        run: |
          # git clang-format checks only the lines touched by the PR diff,
          # not pre-existing formatting issues in unchanged lines.
          git clang-format --diff origin/${{ github.base_ref }} HEAD \
            -- 'src/**/*.cpp' 'src/**/*.hpp' 'src/**/*.h' 'src/**/*.c' \
            > /tmp/clang_diff.txt 2>&1 || true
          if grep -q "^---\|^+++" /tmp/clang_diff.txt; then
            echo "Formatting issues found in changed lines:"
            cat /tmp/clang_diff.txt
            exit 1
          fi
          echo "All changed lines are correctly formatted."
