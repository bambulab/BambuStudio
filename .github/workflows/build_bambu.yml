name: Build BambuStudio

on:
  workflow_call:
    inputs:
      cache-key:
        required: true
        type: string
      cache-path:
        required: false
        type: string
      os:
        required: true
        type: string
      arch:
        required: false
        type: string

permissions: read-all

jobs:
  build_bambu:
    name: Build BambuStudio
    runs-on: ${{ inputs.os }}
    timeout-minutes: 120
    env:
      date: ""
      ver: ""
      ver_pure: ""

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          lfs: 'true'

      - name: load cached deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ${{ inputs.cache-path || format('{0}/deps/build', github.workspace) }}
          key: ${{ inputs.cache-key }}
          restore-keys: |
            bambu-deps-${{ inputs.os }}-${{ inputs.arch }}-
          fail-on-cache-miss: false

      - name: Get the version and date on Ubuntu and macOS
        if: runner.os != 'Windows'
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          set -euo pipefail
          ver_pure=$(grep 'set(SLIC3R_VERSION_BASE' version.inc | cut -d '"' -f2)
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            ver="PR-${PR_NUMBER}"
          else
            ver="V${ver_pure}"
          fi
          echo "ver=$ver" >> "$GITHUB_ENV"
          echo "ver_pure=$ver_pure" >> "$GITHUB_ENV"
          echo "date=$(date +'%Y%m%d')" >> "$GITHUB_ENV"

      - name: Get the version and date on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          $date = Get-Date -Format 'yyyyMMdd'
          if ($env:EVENT_NAME -eq 'pull_request') {
              $ver = "PR$env:PR_NUMBER"
          } else {
              $versionContent = Get-Content version.inc -Raw
              if ($versionContent -match 'set\(SLIC3R_VERSION_BASE "(.*?)"\)') {
                  $ver = "V$($matches[1])"
              } else {
                  $ver = "Vunknown"
              }
          }
          "ver=$ver" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          "date=$date" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          Write-Host "date: $date version: $ver"

# ── macOS ───────────────────────────────────────────────────────────────────
      - name: Build slicer mac (Intel)
        if: inputs.os == 'macos-15-intel'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          brew install automake texinfo nasm yasm
          brew uninstall --ignore-dependencies zstd || true
          brew unlink cmake || true
          brew tap-new $USER/old-cmake
          brew extract --version=3.31.0 cmake $USER/old-cmake
          brew install $USER/old-cmake/cmake@3.31.0
          brew link --overwrite cmake@3.31.0
          brew pin cmake@3.31.0
          brew install zstd
          if [ ! -d "${{ github.workspace }}/deps/build/x86_64" ]; then
            echo "Kein macOS-Intel Cache vorhanden. Baue Abhängigkeiten + Slicer..."
            ./BuildMac.sh -x -a x86_64 -t 10.15 -1
          else
            echo "Nutze geladene Cache-Abhängigkeiten..."
            ./BuildMac.sh -s -x -a x86_64 -t 10.15 -1
          fi

      - name: Build slicer mac (ARM / Universal)
        if: inputs.os == 'macos-15'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          brew install automake texinfo nasm yasm
          brew uninstall --ignore-dependencies zstd || true
          brew unlink cmake || true
          brew tap-new $USER/old-cmake
          brew extract --version=3.31.0 cmake $USER/old-cmake
          brew install $USER/old-cmake/cmake@3.31.0
          brew link --overwrite cmake@3.31.0
          brew pin cmake@3.31.0
          brew install zstd
          if [ ! -d "${{ github.workspace }}/deps/build/arm64" ]; then
            echo "Kein macOS-ARM Cache vorhanden. Baue Abhängigkeiten + Slicer..."
            ./BuildMac.sh -x -a universal -t 10.15 -1
          else
            echo "Nutze geladene Cache-Abhängigkeiten..."
            ./BuildMac.sh -s -x -a universal -t 10.15 -1
          fi

      - name: Pack macOS .dmg
        if: runner.os == 'macOS'
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          if [[ "${{ inputs.arch }}" == "x86_64" ]]; then
            APP_PATH="${{ github.workspace }}/build/x86_64/BambuStudio/BambuStudio.app"
          else
            APP_PATH="${{ github.workspace }}/build/universal/BambuStudio/BambuStudio.app"
          fi
          DMG_NAME="BambuStudio_Mac_${{ inputs.arch }}_${{ env.ver }}.dmg"
          mkdir -p /tmp/dmg-staging
          cp -R "$APP_PATH" /tmp/dmg-staging/BambuStudio.app
          ln -s /Applications /tmp/dmg-staging/Applications
          hdiutil create -volname "BambuStudio ${{ env.ver }}" \
            -srcfolder /tmp/dmg-staging \
            -ov -format UDZO \
            "${{ github.workspace }}/$DMG_NAME"

      - name: Upload artifacts mac
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_Mac_${{ inputs.arch }}_${{ env.ver }}
          path: ${{ github.workspace }}/BambuStudio_Mac_${{ inputs.arch }}_${{ env.ver }}.dmg

# ── Windows ─────────────────────────────────────────────────────────────────
      - name: setup MSVC
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57  # v3

      - name: Install nsis and pkgconfig
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          choco install nsis --version=3.10.0 --force -y
          choco install pkgconfiglite --version=0.28 --force -y

      - name: Build slicer Win
        if: runner.os == 'Windows'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          $depPath = "$env:GITHUB_WORKSPACE\deps\build\BambuStudio_dep"
          if (!(Test-Path $depPath)) {
              Write-Host "Kein Windows-Cache gefunden! Kompiliere Third-Party-Abhängigkeiten zuerst..."
              choco install strawberryperl pkgconfiglite -y
              New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\deps\build\BambuStudio_dep" | Out-Null
              Push-Location "$env:GITHUB_WORKSPACE\deps\build"
              cmake ../ -G "Visual Studio 17 2022" -A x64 -DDESTDIR="./BambuStudio_dep" -DCMAKE_BUILD_TYPE=Release -DDEP_DEBUG=OFF
              msbuild /m ALL_BUILD.vcxproj
              Pop-Location
          }
          New-Item -ItemType Directory -Force -Path build | Out-Null
          Push-Location build
          cmake .. -G "Visual Studio 17 2022" -A X64 `
            -DBBL_RELEASE_TO_PUBLIC=1 -DBBL_INTERNAL_TESTING=0 `
            -DCMAKE_PREFIX_PATH="$depPath" `
            -DCMAKE_INSTALL_PREFIX="../install-dir" `
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . --target install --config Release -- -m
          Pop-Location

      - name: Pack app Win
        if: runner.os == 'Windows'
        working-directory: ${{ github.workspace }}
        shell: cmd
        run: '"C:/Program Files/7-Zip/7z.exe" a -tzip BambuStudio_Windows_${{ env.ver }}_portable.zip ${{ github.workspace }}/install-dir'

      - name: Upload artifacts Win zip
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_Windows_${{ env.ver }}_portable
          path: ${{ github.workspace }}/BambuStudio_Windows_${{ env.ver }}_portable.zip

# ── Ubuntu / Linux ──────────────────────────────────────────────────────────
      - name: Install dependencies from BuildLinux.sh
        if: runner.os == 'Linux'
        shell: bash
        run: sudo ./BuildLinux.sh -ur

      - name: Fix permissions
        if: runner.os == 'Linux'
        shell: bash
        run: sudo chown $USER -R ./

      - name: Build slicer Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Dynamische Cache-Prüfung für Linux-Abhängigkeiten
          if [ ! -d "${{ github.workspace }}/deps/build/destdir" ]; then
            echo "Kein Linux-Cache gefunden! Kompiliere Third-Party-Abhängigkeiten komplett neu..."
            ./BuildLinux.sh -idfr
          fi
          
          # Jetzt steht die destdir bereit, wir bauen den Slicer
          ./BuildLinux.sh -isfr
          mv -n ./build/BambuStudio_ubu64.AppImage ./build/Bambu_Studio_${{ inputs.os }}_${{ env.ver }}.AppImage

      - name: Build .deb package
        if: runner.os == 'Linux'
        shell: bash
        run: ./BuildLinux.sh -pr

      - name: Upload artifacts Ubuntu AppImage
        if: ${{ ! env.ACT && runner.os == 'Linux' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_Linux_AppImage_${{ inputs.os }}_${{ env.ver }}
          path: './build/Bambu_Studio_${{ inputs.os }}_${{ env.ver }}.AppImage'

      - name: Upload .deb package
        if: ${{ ! env.ACT && runner.os == 'Linux' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_Linux_Debian_${{ inputs.os }}_${{ env.ver }}
          path: './build/bambustudio_*.deb'
