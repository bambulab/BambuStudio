on:
  workflow_call:
    inputs:
      cache-key:
        required: true
        type: string
      cache-path:
        required: true
        type: string
      os:
        required: true
        type: string
      arch:
        required: false
        type: string

permissions: read-all

jobs:
  build_bambu:
    name: Build BambuStudio
    runs-on: ${{ inputs.os }}
    timeout-minutes: 120
    env:
      date: ""
      ver: ""
      ver_pure: ""

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          lfs: 'true'

      - name: load cached deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ${{ inputs.cache-path }}
          key: ${{ inputs.cache-key }}
          fail-on-cache-miss: true

      - name: Get the version and date on Ubuntu and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ver_pure=$(grep 'set(SLIC3R_VERSION' version.inc | cut -d '"' -f2)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ver="PR-${{ github.event.number }}"
          else
            ver=V$ver_pure
          fi
          echo "ver=$ver" >> $GITHUB_ENV
          echo "ver_pure=$ver_pure" >> $GITHUB_ENV
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: Get the version and date on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $date = Get-Date -Format 'yyyyMMdd'
          $eventName = "${{ github.event_name }}"
          $prNumber = "${{ github.event.number }}"

          if ($eventName -eq 'pull_request') {
              $ver = "PR" + $prNumber
          } else {
              $versionContent = Get-Content version.inc -Raw
              if ($versionContent -match 'set\(SLIC3R_VERSION "(.*?)"\)') {
                  $ver = $matches[1]
              }
              $ver = "V$ver"
          }

          echo "ver=$ver" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          echo "date=$date" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          echo "date: $date version: $ver"

# ── macOS ───────────────────────────────────────────────────────────────────
      - name: Build slicer mac (Intel)
        if: inputs.os == 'macos-15-intel'
        working-directory: ${{ github.workspace }}
        run: |
          brew install automake texinfo
          ./BuildMac.sh -s -x -a x86_64 -t 10.15 -1

      - name: Build slicer mac (ARM / Universal)
        if: inputs.os == 'macos-15'
        working-directory: ${{ github.workspace }}
        run: |
          brew install automake texinfo
          ./BuildMac.sh -s -x -a universal -t 10.15 -1

      - name: Pack macOS .dmg
        if: runner.os == 'macOS'
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          if [[ "${{ inputs.arch }}" == "x86_64" ]]; then
            APP_PATH="${{ github.workspace }}/build/x86_64/BambuStudio/BambuStudio.app"
          else
            APP_PATH="${{ github.workspace }}/build/universal/BambuStudio/BambuStudio.app"
          fi
          DMG_NAME="BambuStudio_Mac_${{ inputs.arch }}_${{ env.ver }}.dmg"
          mkdir -p /tmp/dmg-staging
          cp -R "$APP_PATH" /tmp/dmg-staging/BambuStudio.app
          ln -s /Applications /tmp/dmg-staging/Applications
          hdiutil create -volname "BambuStudio ${{ env.ver }}" \
            -srcfolder /tmp/dmg-staging \
            -ov -format UDZO \
            "${{ github.workspace }}/$DMG_NAME"

      - name: Upload artifacts mac
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_Mac_${{ inputs.arch }}_${{ env.ver }}
          path: ${{ github.workspace }}/BambuStudio_Mac_${{ inputs.arch }}_${{ env.ver }}.dmg

# ── Windows ─────────────────────────────────────────────────────────────────
      - name: setup MSVC
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57  # v3

      - name: Install nsis and pkgconfig
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          choco install nsis --version=3.10.0 --force -y
          choco install pkgconfiglite --version=0.28 --force -y

      - name: Build slicer Win
        if: runner.os == 'Windows'
        working-directory: ${{ github.workspace }}
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A X64 -DBBL_RELEASE_TO_PUBLIC=1 -DBBL_INTERNAL_TESTING=0 -DCMAKE_PREFIX_PATH="${{ github.workspace }}\deps\build\BambuStudio_dep\usr\local" -DCMAKE_INSTALL_PREFIX="../install-dir" -DCMAKE_BUILD_TYPE=Release -DWIN10SDK_PATH="C:/Program Files (x86)/Windows Kits/10/Include/10.0.22000.0"
          cmake --build . --target install --config Release -- -m

      - name: Pack app Win
        if: runner.os == 'Windows'
        working-directory: ${{ github.workspace }}
        shell: cmd
        run: '"C:/Program Files/7-Zip/7z.exe" a -tzip BambuStudio_Windows_${{ env.ver }}_portable.zip ${{ github.workspace }}/install-dir'

      - name: Upload artifacts Win zip
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_Windows_${{ env.ver }}_portable
          path: ${{ github.workspace }}/BambuStudio_Windows_${{ env.ver }}_portable.zip

# ── Ubuntu / Linux ──────────────────────────────────────────────────────────
      - name: Install dependencies from BuildLinux.sh
        if: runner.os == 'Linux'
        shell: bash
        run: sudo ./BuildLinux.sh -ur

      - name: Fix permissions
        if: runner.os == 'Linux'
        shell: bash
        run: sudo chown $USER -R ./

      - name: Build slicer Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ./BuildLinux.sh -isfr
          mv -n ./build/BambuStudio_ubu64.AppImage ./build/Bambu_Studio_${{ inputs.os }}_${{ env.ver }}.AppImage

      - name: Build .deb package
        if: runner.os == 'Linux'
        shell: bash
        run: ./BuildLinux.sh -pr

      - name: Upload artifacts Ubuntu AppImage
        if: ${{ ! env.ACT && runner.os == 'Linux' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_${{ inputs.os }}_${{ env.ver }}
          path: './build/Bambu_Studio_${{ inputs.os }}_${{ env.ver }}.AppImage'

      - name: Upload .deb package
        if: ${{ ! env.ACT && runner.os == 'Linux' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_${{ inputs.os }}_${{ env.ver }}_deb
          path: './build/bambustudio_*.deb'
