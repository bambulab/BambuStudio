name: Check Cache

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      arch:
        required: false
        type: string
      build-deps-only:
        required: false
        type: boolean

permissions: read-all

jobs:
  check_cache:
    name: Check Cache
    runs-on: ${{ inputs.os }}
    timeout-minutes: 10
    outputs:
      cache-key:  ${{ steps.set_outputs.outputs.cache-key }}
      cache-path: ${{ steps.set_outputs.outputs.cache-path }}
      valid-cache: ${{ steps.cache_deps.outputs.cache-hit }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          lfs: 'false'

      - name: Set cache key and path
        id: set_outputs
        shell: bash
        env:
          INPUT_OS:   ${{ inputs.os }}
          DEPS_HASH:  ${{ hashFiles('deps/**') }}
          # OS-specific subfolder inside deps/build that gets cached
          DEP_FOLDER: ${{ startsWith(inputs.os, 'windows-') && '/BambuStudio_dep'
            || startsWith(inputs.os, 'macos-') && ''
            || '/destdir' }}
        run: |
          set -euo pipefail
          echo "cache-key=${INPUT_OS}-cache-bambustudio_deps-build-${DEPS_HASH}" >> "$GITHUB_OUTPUT"
          echo "cache-path=${GITHUB_WORKSPACE}/deps/build${DEP_FOLDER}"          >> "$GITHUB_OUTPUT"

      - name: Lookup cache (no restore)
        id: cache_deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ${{ steps.set_outputs.outputs.cache-path }}
          key:  ${{ steps.set_outputs.outputs.cache-key }}
          lookup-only: true

  build_deps:
    name: Build Deps
    needs: [check_cache]
    uses: ./.github/workflows/build_deps.yml
    with:
      cache-key:       ${{ needs.check_cache.outputs.cache-key }}
      cache-path:      ${{ needs.check_cache.outputs.cache-path }}
      valid-cache:     ${{ needs.check_cache.outputs.valid-cache == 'true' }}
      os:              ${{ inputs.os }}
      arch:            ${{ inputs.arch }}
      build-deps-only: ${{ inputs.build-deps-only }}
    secrets: inherit
