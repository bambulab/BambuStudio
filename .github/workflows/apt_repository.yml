name: APT Repository Update
run-name: "APT update — ${{ github.event.release.tag_name || inputs.tag || 'latest' }}"

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v02.07.00.55-fork.1 (empty = latest)'
        required: false
        type: string

permissions: read-all

jobs:
  update-apt-repo:
    name: Update APT Repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Determine tag
        id: tag
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh release list --repo "${{ github.repository }}" \
              --exclude-pre-releases \
              --limit 1 --json tagName -q '.[0].tagName')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install tools
        run: sudo apt-get install -y --no-install-recommends dpkg-dev apt-utils knockd rsync

      - name: Download .deb from release
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p pool/main/b/bambu-studio
          # Only the Debian Trixie build goes into the apt repo.
          # Downloading all *.deb would put Ubuntu/self-hosted builds with the same
          # version string into the pool, producing duplicate Packages stanzas and
          # causing apt to offer a same-version "upgrade" on every run.
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "*debian-trixie*.deb" \
            --dir pool/main/b/bambu-studio/ \
            --clobber
          ls -lh pool/main/b/bambu-studio/
          [ -n "$(ls pool/main/b/bambu-studio/*.deb 2>/dev/null)" ] || \
            { echo "ERROR: no debian-trixie .deb found in release $TAG" >&2; exit 1; }
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate Packages index
        run: |
          set -euo pipefail
          mkdir -p dists/stable/main/binary-amd64
          dpkg-scanpackages pool/ \
            > dists/stable/main/binary-amd64/Packages
          gzip  -k -f dists/stable/main/binary-amd64/Packages
          bzip2 -k -f dists/stable/main/binary-amd64/Packages
          echo "Packages: $(wc -l < dists/stable/main/binary-amd64/Packages) lines"

      - name: Generate Release file
        run: |
          set -euo pipefail
          mkdir -p dists/stable
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="BenJule BambuStudio" \
            -o APT::FTPArchive::Release::Label="BenJule BambuStudio" \
            -o APT::FTPArchive::Release::Suite=stable \
            -o APT::FTPArchive::Release::Codename=stable \
            -o APT::FTPArchive::Release::Architectures=amd64 \
            -o APT::FTPArchive::Release::Components=main \
            -o "APT::FTPArchive::Release::Description=BenJule BambuStudio APT Repository" \
            release dists/stable \
            > dists/stable/Release
          cat dists/stable/Release

      - name: Sign Release
        run: |
          set -euo pipefail
          echo "${{ secrets.APT_SIGNING_KEY }}" | gpg --batch --import
          gpg --batch --yes \
            --default-key 1726EB3278D7246499B5F2C319BC754BE4AC6B68 \
            --clearsign \
            -o dists/stable/InRelease \
            dists/stable/Release
          gpg --batch --yes \
            --default-key 1726EB3278D7246499B5F2C319BC754BE4AC6B68 \
            -abs \
            -o dists/stable/Release.gpg \
            dists/stable/Release

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          (umask 077 && printf '%s\n' "${{ secrets.VPS_DEPLOY_KEY }}" > ~/.ssh/deploy_key)
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Port knock and deploy
        run: |
          set -euo pipefail
          knock -d 200 "${{ secrets.VPS_HOST }}" 7000 8000 9000
          sleep 1
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            pool dists \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/srv/apt-repo/"
