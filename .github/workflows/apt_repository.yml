name: APT Repository Update

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v02.07.00.55-fork.1 (empty = latest)'
        required: false
        type: string

permissions: read-all

jobs:
  update-apt-repo:
    name: Update APT Repository
    runs-on: ubuntu-24.04

    steps:
      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG=$(gh release list --repo "${{ github.repository }}" \
              --limit 1 --json tagName -q '.[0].tagName')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install tools
        run: sudo apt-get install -y --no-install-recommends dpkg-dev apt-utils knockd rsync

      - name: Download .deb from release
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p pool/main/b/bambu-studio
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "*.deb" \
            --dir pool/main/b/bambu-studio/ \
            --clobber
          ls -lh pool/main/b/bambu-studio/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate Packages index
        run: |
          mkdir -p dists/stable/main/binary-amd64
          dpkg-scanpackages --multiversion pool/ \
            > dists/stable/main/binary-amd64/Packages
          gzip  -k -f dists/stable/main/binary-amd64/Packages
          bzip2 -k -f dists/stable/main/binary-amd64/Packages
          echo "Packages: $(wc -l < dists/stable/main/binary-amd64/Packages) lines"

      - name: Generate Release file
        run: |
          mkdir -p dists/stable
          printf '%s\n' \
            'Origin: BenJule BambuStudio' \
            'Label: BenJule BambuStudio' \
            'Suite: stable' \
            'Codename: stable' \
            'Architectures: amd64' \
            'Components: main' \
            'Description: BenJule BambuStudio APT Repository' \
            > dists/stable/Release
          cd dists/stable && apt-ftparchive release . >> Release
          cat dists/stable/Release

      - name: Sign Release
        run: |
          echo "${{ secrets.APT_SIGNING_KEY }}" | gpg --batch --import
          gpg --batch --yes \
            --default-key 1726EB3278D7246499B5F2C319BC754BE4AC6B68 \
            --clearsign \
            -o dists/stable/InRelease \
            dists/stable/Release
          gpg --batch --yes \
            --default-key 1726EB3278D7246499B5F2C319BC754BE4AC6B68 \
            -abs \
            -o dists/stable/Release.gpg \
            dists/stable/Release

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Port knock and deploy
        run: |
          knock -d 200 "${{ secrets.VPS_HOST }}" 7000 8000 9000
          sleep 1
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            pool/ dists/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/srv/apt-repo/"
