name: Close stale issues and PRs

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale items
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: |
            api.github.com:443
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899  # v10.3.0
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity for 60 days. It will be closed in 14 days if no further
            activity occurs. If this is still relevant, please leave a comment.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            not had any activity for 30 days. It will be closed in 14 days if no
            further activity occurs.
          close-issue-message: 'Closing due to inactivity. Please reopen if still relevant.'
          close-pr-message: 'Closing due to inactivity. Please reopen if you want to continue.'
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 14
          stale-issue-label: 'wontfix'
          stale-pr-label: 'wontfix'
          exempt-issue-labels: 'priority: critical,priority: high,status: in-progress,status: blocked'
          exempt-pr-labels: 'priority: critical,priority: high,status: in-progress,status: blocked'
          operations-per-run: 100
