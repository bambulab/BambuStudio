name: Quality Gate

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
  push:
    branches:
      - "ci/**"

jobs:
  validator-unit-tests:
    name: Validator Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run validator unit tests
        shell: bash
        run: |
          mkdir -p .ci
          python -m unittest discover -s tests/quality -p "test_*.py" -v 2>&1 | tee .ci/validator-unit-tests.log
          echo "## Validator Unit Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Command: \`python -m unittest discover -s tests/quality -p \"test_*.py\" -v\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result:" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          tail -n 12 .ci/validator-unit-tests.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload validator logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: quality-gate-validator-logs
          path: .ci/validator-unit-tests.log

  profile-config-check:
    name: Profile Config Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Validate profile and config assets
        shell: bash
        run: |
          mkdir -p .ci
          python scripts/quality/profile_config_check.py resources/profiles resources/printers resources/info resources/data 2>&1 | tee .ci/profile-config-check.log
          echo "## Profile Config Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Command: \`python scripts/quality/profile_config_check.py resources/profiles resources/printers resources/info resources/data\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result:" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          tail -n 12 .ci/profile-config-check.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload profile check logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: quality-gate-profile-check-logs
          path: .ci/profile-config-check.log
