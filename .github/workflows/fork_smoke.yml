name: Fork Smoke

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
  push:
    branches:
      - "ci/**"

jobs:
  smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Show repository context
        run: |
          git rev-parse --short HEAD
          test -f CMakeLists.txt
          test -d tests
