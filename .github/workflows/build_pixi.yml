name: Build (Pixi)

# Smoke test: verify `pixi run bootstrap && pixi run build` still produces
# a working bambu-studio binary on every push/PR that touches the build
# inputs. AppImage / dmg / msi packaging is intentionally out of scope and
# stays in the existing build_all.yml / release flows. Pattern adapted from
# FreeCAD's sub_buildPixi.yml.

on:
  push:
    branches: [main, master, "modernize/**", "ci/**"]
    paths: &triggers
      - 'pixi.toml'
      - 'pixi.lock'
      - 'CMakePresets.json'
      - 'scripts/pixi/**'
      - 'src/**'
      - 'deps/wxWidgets/**'
      - 'deps/libnoise/**'
      - '**/CMakeLists.txt'
      - 'version.inc'
      - '.github/workflows/build_pixi.yml'
  pull_request:
    paths: *triggers
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build with Pixi (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            build_task: build-release
            binary: build/release/src/bambu-studio
            logs: |
              build/release/CMakeFiles/CMakeOutput.log
              build/release/CMakeFiles/CMakeError.log
              build/release/CMakeFiles/CMakeConfigureLog.yaml
          - os: windows-2022
            # Windows pixi.toml has no debug/release split yet; `build` is
            # the single Release task driven by the win-pixi VS preset.
            build_task: build
            binary: build/src/Release/bambu-studio.exe
            logs: |
              build/CMakeFiles/CMakeOutput.log
              build/CMakeFiles/CMakeError.log
              build/CMakeFiles/CMakeConfigureLog.yaml
          - os: macos-14
            # macos-14 is Apple Silicon, matching pixi.toml's osx-arm64 platform.
            build_task: build-release
            binary: build/release/src/bambu-studio
            logs: |
              build/release/CMakeFiles/CMakeOutput.log
              build/release/CMakeFiles/CMakeError.log
              build/release/CMakeFiles/CMakeConfigureLog.yaml

    env:
      # sccache uploads/restores its cache via the GitHub Actions cache API
      # directly (no actions/cache wrapper needed). The sccache-action step
      # below additionally injects ACTIONS_CACHE_URL / ACTIONS_RUNTIME_TOKEN.
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # ubuntu-24.04 hosted runners ship with ~14GB free; pixi env (~1.5GB)
      # + bootstrap workspace (~3GB) + build tree (~5GB) is tight.
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h

      - name: Install bubblewrap (Linux)
        # webkit2gtk4.1 from conda-forge invokes bwrap at runtime; not
        # needed to build, but installed here so test invocations of the
        # binary don't fail on a missing host tool.
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0  # v0.9.5
        with:
          cache: true

      # Unix bootstrap cache: bambulab forks (libnoise + wxWidgets) installed
      # into the pixi env. Linux and macOS share the .pixi/envs/default/{bin,lib,include}
      # layout, so the same path list works for both. Windows uses different paths
      # under .pixi/envs/default/Library/ — caching is left as TODO; bootstrap
      # re-runs every time on win.
      - name: Cache bootstrap (Unix)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        id: cache-bootstrap
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            .pixi/envs/default/bin/wx-config
            .pixi/envs/default/bin/wxrc-3.1
            .pixi/envs/default/lib/wx
            .pixi/envs/default/lib/libwx_*
            .pixi/envs/default/lib/libwxregexu-3.1.a
            .pixi/envs/default/lib/liblibnoise_static.a
            .pixi/envs/default/include/libnoise
            .pixi/envs/default/include/wx-3.1
          key: pixi-bootstrap-${{ matrix.os }}-${{ hashFiles('deps/wxWidgets/**', 'deps/libnoise/**', 'scripts/pixi/setup-libnoise.sh', 'scripts/pixi/setup-wxwidgets.sh', 'scripts/pixi/macos/setup-wxwidgets.sh', 'scripts/pixi/_jobs.sh') }}

      - name: Bootstrap forks (Unix, cache miss)
        if: (runner.os == 'Linux' || runner.os == 'macOS') && steps.cache-bootstrap.outputs.cache-hit != 'true'
        run: pixi run bootstrap

      - name: Bootstrap forks (Windows)
        # No cache yet; ~45-60 min on Windows runner.
        if: runner.os == 'Windows'
        run: pixi run bootstrap

      # Sets ACTIONS_CACHE_URL / ACTIONS_RUNTIME_TOKEN so sccache (from the
      # pixi env, invoked via CMAKE_<LANG>_COMPILER_LAUNCHER) can read/write
      # the GHA cache directly. No actions/cache restore+save needed.
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@1583d6b38d7be47f593cb472781bbb21cab4321e  # v0.0.10

      - name: sccache stats (before)
        run: pixi run sccache --zero-stats && pixi run sccache --show-stats

      - name: Build BambuStudio
        run: pixi run ${{ matrix.build_task }}

      - name: sccache stats (after)
        run: pixi run sccache --show-stats

      - name: Verify binary
        shell: bash
        run: |
          ls -la "${{ matrix.binary }}"

      - name: Package distributable
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: pixi run dist

      - name: Upload AppImage artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: BambuStudio-Linux-AppImage
          path: build/release/BambuStudio-*-x86_64.AppImage
          if-no-files-found: error
          retention-days: 14

      - name: Upload DMG artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: BambuStudio-macOS-DMG
          path: build/release/BambuStudio-*-arm64.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: build-logs-${{ matrix.os }}
          path: ${{ matrix.logs }}
          if-no-files-found: ignore
          retention-days: 7
