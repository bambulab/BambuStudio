name: Build (Pixi)

on:
  push:
    branches: [master]
    paths:
      - 'pixi.toml'
      - 'pixi.lock'
      - 'CMakePresets.json'
      - 'scripts/pixi/**'
      - 'src/**'
      - 'deps/wxWidgets/**'
      - 'deps/libnoise/**'
      - '**/CMakeLists.txt'
      - 'version.inc'
      - 'resources/**'
      - 'bbl/**'
      - '.github/workflows/build_pixi.yml'
  pull_request:
    paths:
      - 'pixi.toml'
      - 'pixi.lock'
      - 'CMakePresets.json'
      - 'scripts/pixi/**'
      - 'src/**'
      - 'deps/wxWidgets/**'
      - 'deps/libnoise/**'
      - '**/CMakeLists.txt'
      - 'version.inc'
      - 'resources/**'
      - 'bbl/**'
      - '.github/workflows/build_pixi.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check prerequisites
    runs-on: ubuntu-latest
    outputs:
      has_pixi: ${{ steps.pixi-check.outputs.has_pixi }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          sparse-checkout: |
            pixi.toml
          sparse-checkout-cone-mode: false
      - name: Check for pixi.toml
        id: pixi-check
        shell: bash
        run: |
          if [ -f pixi.toml ]; then
            echo "has_pixi=true" >> "$GITHUB_OUTPUT"
          else
            echo "pixi.toml not found — skipping build jobs"
            echo "has_pixi=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build with Pixi (${{ matrix.artifact_name }})
    needs: [check]
    if: needs.check.outputs.has_pixi == 'true'
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            build_task: build-release
            binary: build/release/src/bambu-studio
            artifact_name: BambuStudio-Linux-AppImage
            artifact_glob: build/release/BambuStudio-*-x86_64.AppImage
          - os: ubuntu-24.04
            container: debian:bookworm
            build_task: build-release
            binary: build/release/src/bambu-studio
            artifact_name: BambuStudio-Debian-AppImage
            artifact_glob: build/release/BambuStudio-*-x86_64.AppImage
          - os: windows-2022
            build_task: build-release
            binary: build/release/src/bambu-studio.exe
            artifact_name: BambuStudio-Windows-MSI
            artifact_glob: build/release/dist/BambuStudio-*-x64.msi
          - os: macos-14
            build_task: build-release
            binary: build/release/src/bambu-studio
            artifact_name: BambuStudio-macOS-DMG
            artifact_glob: build/release/BambuStudio-*-arm64.dmg

    env:
      SCCACHE_GHA_ENABLED: "true"   # sccache reads/writes GHA Cache directly

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # ubuntu runner ships ~14 GB free; pixi env + bootstrap + build is tight.
      - name: Free disk space (Linux, no container)
        if: runner.os == 'Linux' && !matrix.container
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h

      - name: Install curl (Debian container)
        if: matrix.container == 'debian:bookworm'
        run: apt-get update && apt-get install -y curl

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0  # v0.9.5
        with:
          cache: true
          post-cleanup: false

      # Bootstrap cache: outputs of `pixi run bootstrap` (libnoise +
      # wxWidgets fork builds, plus the OCCT/intl/lib-aliases/WebView2
      # bridges on Windows). Cache miss = ~30-60 min depending on host.
      - name: Cache bootstrap (Unix)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        id: cache-bootstrap
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            .pixi/envs/default/bin/wx-config
            .pixi/envs/default/bin/wxrc-3.1
            .pixi/envs/default/lib/wx
            .pixi/envs/default/lib/libwx_*
            .pixi/envs/default/lib/libwxregexu-3.1.a
            .pixi/envs/default/lib/liblibnoise_static.a
            .pixi/envs/default/include/libnoise
            .pixi/envs/default/include/wx-3.1
          key: pixi-bootstrap-${{ matrix.artifact_name }}-${{ hashFiles('deps/wxWidgets/**', 'deps/libnoise/**', 'scripts/pixi/shared/setup-libnoise.sh', 'scripts/pixi/linux/setup-wxwidgets.sh', 'scripts/pixi/macos/setup-wxwidgets.sh', 'scripts/pixi/shared/_jobs.sh') }}

      - name: Cache bootstrap (Windows)
        if: runner.os == 'Windows'
        id: cache-bootstrap-windows
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          save-always: true
          path: |
            .pixi/envs/default/Library/lib/libnoise_static.lib
            .pixi/envs/default/Library/include/libnoise
            .pixi/envs/default/Library/lib/vc_x64_lib
            .pixi/envs/default/Library/include/wx
            .pixi/envs/default/Library/include/WebView2.h
            .pixi/envs/default/Library/include/WebView2EnvironmentOptions.h
            .pixi/envs/default/Library/lib/WebView2Loader.dll.lib
            .pixi/envs/default/Library/lib/WebView2LoaderStatic.lib
            .pixi/envs/default/Library/bin/WebView2Loader.dll
            .pixi/envs/default/Library/lib/intl.lib
            .pixi/envs/default/Library/lib/libpng16.lib
            .pixi/envs/default/Library/lib/tiff.lib
            .pixi/envs/default/Library/lib/zlib.lib
            .pixi/envs/default/Library/lib/jpeg8.lib
            .pixi/envs/default/Library/lib/mp3lame.lib
            .pixi/envs/default/Library/lib/x265.lib
          key: pixi-bootstrap-windows-${{ hashFiles('scripts/pixi/windows/setup-*.ps1', 'scripts/pixi/windows/_jobs.ps1', 'deps/wxWidgets/**', 'deps/libnoise/**') }}

      - name: Bootstrap forks (Unix, cache miss)
        if: (runner.os == 'Linux' || runner.os == 'macOS') && steps.cache-bootstrap.outputs.cache-hit != 'true'
        run: pixi run bootstrap

      - name: Bootstrap forks (Windows, cache miss)
        if: runner.os == 'Windows' && steps.cache-bootstrap-windows.outputs.cache-hit != 'true'
        run: pixi run bootstrap

      - name: Re-create OCCT junction (Windows, cache hit)
        if: runner.os == 'Windows' && steps.cache-bootstrap-windows.outputs.cache-hit == 'true'
        run: pixi run setup-occt-bridge

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@1583d6b38d7be47f593cb472781bbb21cab4321e  # v0.0.10

      - name: sccache stats (before)
        run: pixi run sccache --zero-stats && pixi run sccache --show-stats

      - name: Build BambuStudio
        run: pixi run ${{ matrix.build_task }}

      - name: sccache stats (after)
        run: pixi run sccache --show-stats

      - name: Verify binary
        shell: bash
        run: ls -la "${{ matrix.binary }}"

      - name: Package distributable
        run: pixi run dist

      - name: Upload distributable artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: build-logs-${{ matrix.artifact_name }}
          path: |
            build/release/CMakeFiles/CMakeOutput.log
            build/release/CMakeFiles/CMakeError.log
            build/release/CMakeFiles/CMakeConfigureLog.yaml
          if-no-files-found: ignore
          retention-days: 7
