name: Build (Pixi)

# Smoke test: verify `pixi run bootstrap && pixi run build` still produces
# a working bambu-studio binary on every push/PR that touches the build
# inputs. AppImage / dmg / msi packaging is intentionally out of scope and
# stays in the existing build_all.yml / release flows. Pattern adapted from
# FreeCAD's sub_buildPixi.yml.

on:
  push:
    branches: [main, master, "modernize/**", "ci/**"]
    paths: &triggers
      - 'pixi.toml'
      - 'pixi.lock'
      - 'CMakePresets.json'
      - 'scripts/pixi/**'
      - 'src/**'
      - 'deps/wxWidgets/**'
      - 'deps/libnoise/**'
      - '**/CMakeLists.txt'
      - 'version.inc'
      - '.github/workflows/build_pixi.yml'
  pull_request:
    paths: *triggers
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build with Pixi (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Mirrors pixi.toml [workspace].platforms. Add osx-* / windows-*
        # here once those platforms are added to pixi.toml.
        os: [ubuntu-24.04]

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 1G
      CCACHE_COMPRESS: "true"
      CCACHE_COMPRESSLEVEL: "5"
      CCACHE_COMPILERCHECK: "%compiler% -dumpfullversion -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_SLOPPINESS: "include_file_ctime,include_file_mtime,pch_defines,time_macros"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # ubuntu-24.04 hosted runners ship with ~14GB free; pixi env (~1.5GB)
      # + bootstrap workspace (~3GB) + build tree (~5GB) is tight.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h

      - name: Install bubblewrap
        # webkit2gtk4.1 from conda-forge invokes bwrap at runtime; not
        # needed to build, but installed here so test invocations of the
        # binary don't fail on a missing host tool.
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0  # v0.9.5
        with:
          cache: true

      # Cache the bambulab forks (libnoise + wxWidgets) installed into the
      # pixi env. Their bootstrap takes 30-40 minutes; only re-run when the
      # build scripts or fork sources actually change.
      - name: Cache bootstrap (libnoise + wxWidgets)
        id: cache-bootstrap
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            .pixi/envs/default/bin/wx-config
            .pixi/envs/default/bin/wxrc-3.1
            .pixi/envs/default/lib/wx
            .pixi/envs/default/lib/libwx_*
            .pixi/envs/default/lib/libwxregexu-3.1.a
            .pixi/envs/default/lib/liblibnoise_static.a
            .pixi/envs/default/include/libnoise
            .pixi/envs/default/include/wx-3.1
          key: pixi-bootstrap-${{ matrix.os }}-${{ hashFiles('deps/wxWidgets/**', 'deps/libnoise/**', 'scripts/pixi/setup-libnoise.sh', 'scripts/pixi/setup-wxwidgets.sh', 'scripts/pixi/_jobs.sh') }}

      - name: Bootstrap forks (libnoise + wxWidgets)
        if: steps.cache-bootstrap.outputs.cache-hit != 'true'
        run: pixi run bootstrap

      - name: Restore ccache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.os }}-${{ github.ref }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.os }}-${{ github.ref }}-
            ccache-${{ matrix.os }}-

      - name: ccache stats (before)
        run: pixi run ccache -z && pixi run ccache -s

      - name: Build BambuStudio
        run: pixi run build

      - name: ccache stats (after)
        run: pixi run ccache -s

      - name: Verify binary
        run: test -x build/src/bambu-studio && file build/src/bambu-studio

      # Save unconditionally so partial caches still get persisted on
      # restore-key fallback (actions/cache/restore writes nothing).
      - name: Save ccache
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.os }}-${{ github.ref }}-${{ github.run_id }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: build-logs-${{ matrix.os }}
          path: |
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
            build/CMakeFiles/CMakeConfigureLog.yaml
          if-no-files-found: ignore
          retention-days: 7
