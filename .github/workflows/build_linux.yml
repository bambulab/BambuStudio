name: Build Linux

on:
  push:
    branches:
     - master
    paths:
     - 'deps/**'
     - 'src/**'
     - '**/CMakeLists.txt'
     - 'version.inc'
     - 'bbl/**'
     - 'resources/**'
     - ".github/workflows/build_*.yml"
     - 'BuildLinux.sh'

  pull_request:
    branches:
     - master
    paths:
     - 'deps/**'
     - 'src/**'
     - '**/CMakeLists.txt'
     - 'version.inc'
     - ".github/workflows/build_*.yml"
     - 'BuildLinux.sh'

  workflow_dispatch:
    inputs:
      build-deps-only:
          description: 'Only build dependencies (bypasses caching)'
          type: boolean
          default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_all:
    name: Build Linux
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: ubuntu-24.04
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os: ${{ matrix.os }}
      build-deps-only: ${{ inputs.build-deps-only || false }}
    secrets: inherit
