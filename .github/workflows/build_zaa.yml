name: Build ZAA Release

on:
  workflow_dispatch:
    inputs:
      build_linux:
        description: 'Build Linux AppImage'
        required: true
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows Portable'
        required: true
        default: true
        type: boolean
      build_mac:
        description: 'Build macOS'
        required: true
        default: true
        type: boolean
      release_tag:
        description: 'Upload to this release tag (leer = kein Upload)'
        required: false
        default: 'zaa-v2.5.0'
        type: string

jobs:
  linux-appimage:
    name: Linux AppImage (${{ matrix.os }})
    if: ${{ inputs.build_linux }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - name: Free disk space
        run: |
          sudo docker rmi $(docker image ls -aq) || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo apt-get autoremove -y || true

      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgl1-mesa-dev libgtk-3-dev libxkbcommon-dev libunwind-dev libfuse2

      - name: Install build dependencies
        run: sudo ./BuildLinux.sh -ur

      - name: Fix permissions
        run: sudo chown $USER -R ./

      - name: Cache deps
        id: cache_deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/deps/build/destdir
          key: linux-deps-${{ matrix.os }}-${{ hashFiles('deps/CMakeLists.txt') }}

      - name: Build deps
        if: steps.cache_deps.outputs.cache-hit != 'true'
        run: ./BuildLinux.sh -dsr

      - name: Build BambuStudio + AppImage
        run: ./BuildLinux.sh -isr

      - name: Rename AppImage with OS suffix
        run: |
          mv ./build/BambuStudio_ubu64.AppImage ./build/BambuStudio-ZAA_Linux_${{ matrix.os }}.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: BambuStudio-ZAA_Linux_AppImage_${{ matrix.os }}
          path: './build/BambuStudio-ZAA_Linux_${{ matrix.os }}.AppImage'

      - name: Upload to Release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ./build/BambuStudio-ZAA_Linux_${{ matrix.os }}.AppImage
          tag_name: ${{ inputs.release_tag }}

  mac-x86:
    name: macOS x86_64
    if: ${{ inputs.build_mac }}
    runs-on: macos-15-intel

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/share/powershell /usr/local/.ghcup || true
          sudo rm -rf /usr/local/share/chromium /usr/local/lib/node_modules || true

      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install automake texinfo nasm
          brew unlink cmake || true
          brew tap-new $USER/old-cmake
          brew extract --version=3.31.0 cmake $USER/old-cmake
          brew install $USER/old-cmake/cmake@3.31.0
          brew link --overwrite cmake@3.31.0
          brew pin cmake@3.31.0

      - name: Cache deps
        id: cache_deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/deps/build/destdir
          key: mac-x86-deps-${{ hashFiles('deps/CMakeLists.txt') }}

      - name: Build deps
        if: steps.cache_deps.outputs.cache-hit != 'true'
        run: ./BuildMac.sh -d -x -a x86_64 -t 10.15 -1

      - name: Build app
        run: ./BuildMac.sh -s -x -a x86_64 -t 10.15 -1

      - name: Pack macOS app
        run: |
          APP=$(find build -name "BambuStudio.app" -type d | head -1)
          echo "Found app at: $APP"
          cd "$(dirname "$APP")"
          zip -r "$GITHUB_WORKSPACE/BambuStudio-ZAA_Mac_x86_64.zip" BambuStudio.app

      - name: Upload macOS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: BambuStudio-ZAA_Mac_x86_64
          path: BambuStudio-ZAA_Mac_x86_64.zip

      - name: Upload to Release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          files: BambuStudio-ZAA_Mac_x86_64.zip
          tag_name: ${{ inputs.release_tag }}

  mac-arm:
    name: macOS ARM (Universal)
    if: ${{ inputs.build_mac }}
    runs-on: macos-15

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/share/powershell /usr/local/.ghcup || true

      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install automake texinfo nasm
          brew unlink cmake || true
          brew tap-new $USER/old-cmake
          brew extract --version=3.31.0 cmake $USER/old-cmake
          brew install $USER/old-cmake/cmake@3.31.0
          brew link --overwrite cmake@3.31.0
          brew pin cmake@3.31.0

      - name: Cache deps
        id: cache_deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/deps/build/destdir
          key: mac-arm-deps-${{ hashFiles('deps/CMakeLists.txt') }}

      - name: Build deps
        if: steps.cache_deps.outputs.cache-hit != 'true'
        run: ./BuildMac.sh -d -x -a universal -t 10.15 -1

      - name: Build app
        run: ./BuildMac.sh -s -x -a universal -t 10.15 -1

      - name: Pack macOS app
        run: |
          APP=$(find build -name "BambuStudio.app" -type d | head -1)
          echo "Found app at: $APP"
          cd "$(dirname "$APP")"
          zip -r "$GITHUB_WORKSPACE/BambuStudio-ZAA_Mac_universal.zip" BambuStudio.app

      - name: Upload macOS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: BambuStudio-ZAA_Mac_universal
          path: BambuStudio-ZAA_Mac_universal.zip

      - name: Upload to Release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          files: BambuStudio-ZAA_Mac_universal.zip
          tag_name: ${{ inputs.release_tag }}

  windows-portable:
    name: Windows Portable
    if: ${{ inputs.build_windows }}
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 3.31.6

      - name: Install Strawberry Perl
        run: choco install strawberryperl -y

      - name: Cache deps
        id: cache_deps
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/deps/build/BambuStudio_dep
          key: win-deps-${{ hashFiles('deps/CMakeLists.txt') }}

      - name: Build deps
        if: steps.cache_deps.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=amd64
          cd deps
          mkdir build
          cd build
          cmake ../ -G "Visual Studio 17 2022" -A x64 -DDESTDIR="./BambuStudio_dep" -DCMAKE_BUILD_TYPE=Release -DDEP_DEBUG=OFF
          msbuild /m ALL_BUILD.vcxproj /p:Configuration=Release /v:minimal
          msbuild /m ALL_BUILD.vcxproj /p:Configuration=Release /v:minimal
          msbuild /m ALL_BUILD.vcxproj /p:Configuration=Release /v:minimal

      - name: Build BambuStudio
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=amd64
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DBBL_RELEASE_TO_PUBLIC=1 -DCMAKE_PREFIX_PATH="%GITHUB_WORKSPACE%/deps/build/BambuStudio_dep/usr/local" -DCMAKE_INSTALL_PREFIX="../install_dir" -DCMAKE_BUILD_TYPE=Release -DWIN10SDK_PATH="C:/Program Files (x86)/Windows Kits/10/Include/10.0.22000.0"
          cmake --build . --target install --config Release -- /m

      - name: Create Portable ZIP
        run: 7z a -tzip BambuStudio-ZAA_Windows_portable.zip ./install_dir/*

      - name: Upload Portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: BambuStudio-ZAA_Windows_Portable
          path: BambuStudio-ZAA_Windows_portable.zip

      - name: Upload to Release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          files: BambuStudio-ZAA_Windows_portable.zip
          tag_name: ${{ inputs.release_tag }}
