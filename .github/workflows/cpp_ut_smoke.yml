name: Cpp UT Smoke

on:
  workflow_dispatch:
    inputs:
      deps-run-id:
        description: "Optional Build Windows Deps run id"
        required: false
        type: string
  pull_request:
    branches:
      - master
  push:
    branches:
      - "ci/**"
    paths:
      - "src/**"
      - "tests/**"
      - "deps/**"
      - "**/CMakeLists.txt"
      - "build_win.bat"
      - ".github/workflows/cpp_ut_smoke.yml"
      - ".github/workflows/deps_build.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-deps-run:
    name: Resolve Deps Run
    runs-on: ubuntu-24.04
    outputs:
      run-id: ${{ steps.resolve.outputs.run-id }}
      branch-name: ${{ steps.resolve.outputs.branch-name }}
    steps:
      - name: Resolve deps run id
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RUN_ID: ${{ inputs.deps-run-id }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          echo "branch-name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          if [[ -n "${INPUT_RUN_ID:-}" ]]; then
            echo "run-id=$INPUT_RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_id="$(gh run list \
            -R "$REPOSITORY" \
            --workflow "Build Windows Deps" \
            --branch "$BRANCH_NAME" \
            --json databaseId,conclusion,status \
            --limit 20 \
            | python -c 'import json,sys; runs=json.load(sys.stdin); print(next((str(r["databaseId"]) for r in runs if r.get("conclusion")=="success"), ""))')"

          if [[ -z "$run_id" ]]; then
            echo "No successful 'Build Windows Deps' run found for branch $BRANCH_NAME" >&2
            exit 1
          fi

          echo "run-id=$run_id" >> "$GITHUB_OUTPUT"

  cpp-ut-smoke:
    name: Cpp UT Smoke
    needs: resolve-deps-run
    runs-on: windows-latest
    env:
      DEPS_ZIP_DIR: ${{ github.workspace }}\deps-artifact
      DEPS_ROOT: ${{ github.workspace }}\deps\build\BambuStudio_dep
      BUILD_DIR: ${{ github.workspace }}\build-smoke
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_DIR: ${{ github.workspace }}\_sccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: "true"

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Show build tool versions
        shell: pwsh
        run: |
          cmake --version
          ninja --version
          where.exe cl
          & $env:SCCACHE_PATH --version

      - name: Reset sccache stats
        shell: pwsh
        run: |
          & $env:SCCACHE_PATH --stop-server | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "sccache server was not running before reset"
          }
          & $env:SCCACHE_PATH --zero-stats

      - name: Download deps artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh run download ${{ needs.resolve-deps-run.outputs.run-id }} `
            -R ${{ github.repository }} `
            -n bambustudio-windows-deps `
            -D "${{ env.DEPS_ZIP_DIR }}"

      - name: Expand deps artifact
        shell: pwsh
        run: |
          $zip = Get-ChildItem "${{ env.DEPS_ZIP_DIR }}" -Filter *.zip | Select-Object -First 1
          if (-not $zip) {
            throw "No deps zip found under ${{ env.DEPS_ZIP_DIR }}"
          }
          if (Test-Path "${{ env.DEPS_ROOT }}") {
            Remove-Item -Recurse -Force "${{ env.DEPS_ROOT }}"
          }
          New-Item -ItemType Directory -Force -Path "${{ env.DEPS_ROOT }}" | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath "${{ env.DEPS_ROOT }}"

      - name: Install Windows build tooling
        shell: pwsh
        run: |
          choco install strawberryperl --no-progress -y
          choco install pkgconfiglite --no-progress -y

      - name: Detect Windows SDK
        id: windows_sdk
        shell: pwsh
        run: |
          $sdk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include" | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty Name
          if (-not $sdk) {
            throw "Windows SDK not found"
          }
          echo "sdk-version=$sdk" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Configure cpp smoke build
        shell: pwsh
        run: |
          if (Test-Path "${{ env.BUILD_DIR }}") {
            Remove-Item -Recurse -Force "${{ env.BUILD_DIR }}"
          }
          $cl = Join-Path $env:VCToolsInstallDir "bin\Hostx64\x64\cl.exe"
          if (-not (Test-Path $cl)) {
            throw "MSVC compiler not found at $cl"
          }
          $sdkBin = "C:\Program Files (x86)\Windows Kits\10\bin\${{ steps.windows_sdk.outputs.sdk-version }}\x64"
          $rc = Join-Path $sdkBin "rc.exe"
          $mt = Join-Path $sdkBin "mt.exe"
          if (-not (Test-Path $rc)) {
            throw "Windows resource compiler not found at $rc"
          }
          if (-not (Test-Path $mt)) {
            throw "Windows manifest tool not found at $mt"
          }
          $cl = $cl -replace "\\","/"
          $rc = $rc -replace "\\","/"
          $mt = $mt -replace "\\","/"
          cmake -S . -B "${{ env.BUILD_DIR }}" `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER="$cl" `
            -DCMAKE_CXX_COMPILER="$cl" `
            -DCMAKE_RC_COMPILER="$rc" `
            -DCMAKE_MT="$mt" `
            -DSLIC3R_GUI=OFF `
            -DSLIC3R_STATIC=ON `
            -DSLIC3R_BUILD_TESTS=ON `
            -DSLIC3R_MSVC_COMPILE_PARALLEL=OFF `
            -DSLIC3R_MSVC_PDB=OFF `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
            -DCMAKE_PREFIX_PATH="${{ env.DEPS_ROOT }}\usr\local" `
            -DPKG_CONFIG_EXECUTABLE="C:/Strawberry/perl/bin/pkg-config.bat" `
            -DWIN10SDK_PATH="C:/Program Files (x86)/Windows Kits/10/Include/${{ steps.windows_sdk.outputs.sdk-version }}"

      - name: Build libslic3r config smoke target
        shell: pwsh
        run: cmake --build "${{ env.BUILD_DIR }}" --target libslic3r_config_smoke --parallel 1

      - name: Build fff_print smoke target
        shell: pwsh
        run: cmake --build "${{ env.BUILD_DIR }}" --target fff_print_smoke --parallel 1

      - name: Add deps runtime DLLs to PATH
        shell: pwsh
        run: |
          "${{ env.DEPS_ROOT }}\usr\local\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          "${{ env.DEPS_ROOT }}\usr\local\bin\occt" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          "${{ env.DEPS_ROOT }}\usr\local\x64\vc17\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Run libslic3r config smoke
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .ci | Out-Null
          $exe = "${{ env.BUILD_DIR }}\tests\libslic3r\libslic3r_config_smoke.exe"
          & $exe "[Config]" 2>&1 | Tee-Object -FilePath .ci\libslic3r-config.log
          & $exe -r junit -o .ci\libslic3r-config.xml "[Config]" | Out-Null

      - name: Run gcodewriter smoke
        shell: pwsh
        run: |
          $exe = "${{ env.BUILD_DIR }}\tests\fff_print\fff_print_smoke.exe"
          & $exe "[GCodeWriter]" 2>&1 | Tee-Object -FilePath .ci\fff-gcodewriter.log
          & $exe -r junit -o .ci\fff-gcodewriter.xml "[GCodeWriter]" | Out-Null

      - name: Run model smoke
        shell: pwsh
        run: |
          $exe = "${{ env.BUILD_DIR }}\tests\fff_print\fff_print_smoke.exe"
          & $exe "[Model]" 2>&1 | Tee-Object -FilePath .ci\fff-model.log
          & $exe -r junit -o .ci\fff-model.xml "[Model]" | Out-Null

      - name: Show sccache stats
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .ci | Out-Null
          $stats = & $env:SCCACHE_PATH --show-stats 2>&1
          $stats | Tee-Object -FilePath .ci\sccache-stats.txt
          $selected = @(
            "Compile requests",
            "Compile requests executed",
            "Cache hits",
            "Cache misses",
            "Cache hits rate",
            "Non-cacheable compilations",
            "Non-cacheable calls",
            "Cache errors",
            "Cache size"
          )
          $pairs = @{}
          foreach ($line in $stats) {
            if ($line -match '^(?<key>.+?)\s{2,}(?<value>.+)$') {
              $pairs[$matches.key.Trim()] = $matches.value.Trim()
            }
          }
          $reasons = @()
          $inReasons = $false
          foreach ($line in $stats) {
            if ($line -match '^Non-cacheable reasons:') {
              $inReasons = $true
              continue
            }
            if ($inReasons) {
              if ([string]::IsNullOrWhiteSpace($line)) {
                break
              }
              $reasons += $line.Trim()
            }
          }
          @"
          ## sccache

          | Metric | Value |
          | --- | --- |
          $(
            ($selected | Where-Object { $pairs.ContainsKey($_) } | ForEach-Object { "| $_ | $($pairs[$_]) |" }) -join "`n"
          )

          $(
            if ($reasons.Count -gt 0) {
              "### Non-cacheable reasons`n" + (($reasons | ForEach-Object { "- `$_`" }) -join "`n")
            } else {
              ""
            }
          )

          ```text
          $($stats -join "`n")
          ```
          "@ | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cpp-ut-smoke-logs
          path: |
            .ci\*.log
            .ci\*.txt
            .ci\*.xml

      - name: Write summary
        if: always()
        shell: pwsh
        run: |
          $suiteMeta = @(
            @{ Name = "libslic3r_config_smoke [Config]"; Log = ".ci\libslic3r-config.log"; Xml = ".ci\libslic3r-config.xml" },
            @{ Name = "fff_print_smoke [GCodeWriter]"; Log = ".ci\fff-gcodewriter.log"; Xml = ".ci\fff-gcodewriter.xml" },
            @{ Name = "fff_print_smoke [Model]"; Log = ".ci\fff-model.log"; Xml = ".ci\fff-model.xml" }
          )

          $rows = New-Object System.Collections.Generic.List[string]
          $totalCases = 0
          $totalAssertions = 0
          $passedSuites = 0

          foreach ($suite in $suiteMeta) {
            $cases = 0
            $assertions = 0
            if (Test-Path $suite.Log) {
              $logText = Get-Content $suite.Log -Raw
              if ($logText -match 'All tests passed \((?<assertions>\d+) assertion[s]? in (?<cases>\d+) test case[s]?\)') {
                $cases = [int]$matches.cases
                $assertions = [int]$matches.assertions
              }
            }

            if (($cases -eq 0 -or $assertions -eq 0) -and (Test-Path $suite.Xml)) {
              [xml]$xml = Get-Content $suite.Xml
              $suiteNode = $xml.testsuites.testsuite
              if ($suiteNode) {
                $cases = [int]$suiteNode.testcase.Count
              }
            }

            if ($cases -gt 0 -or $assertions -gt 0) {
              $passedSuites += 1
            }
            $totalCases += $cases
            $totalAssertions += $assertions
            $rows.Add("| $($suite.Name) | $cases | $assertions |")
          }

          @"
          ## Cpp UT Smoke

          - Branch: `${{ needs.resolve-deps-run.outputs.branch-name }}`
          - Deps run id: `${{ needs.resolve-deps-run.outputs.run-id }}`
          - Smoke commands passed: `$passedSuites / 3`
          - Reported test cases: `$totalCases`
          - Reported assertions: `$totalAssertions`

          | Suite | Test Cases | Assertions |
          | --- | ---: | ---: |
          $($rows -join "`n")
          "@ | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
