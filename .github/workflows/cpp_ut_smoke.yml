name: Cpp UT Smoke

on:
  workflow_dispatch:
    inputs:
      deps-run-id:
        description: "Optional Build Windows Deps run id"
        required: false
        type: string
  pull_request:
    branches:
      - master
  push:
    branches:
      - "ci/**"
    paths:
      - "src/**"
      - "tests/**"
      - "deps/**"
      - "**/CMakeLists.txt"
      - "build_win.bat"
      - ".github/workflows/cpp_ut_smoke.yml"
      - ".github/workflows/deps_build.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-deps-run:
    name: Resolve Deps Run
    runs-on: ubuntu-24.04
    outputs:
      run-id: ${{ steps.resolve.outputs.run-id }}
      branch-name: ${{ steps.resolve.outputs.branch-name }}
    steps:
      - name: Resolve deps run id
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RUN_ID: ${{ inputs.deps-run-id }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          echo "branch-name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          if [[ -n "${INPUT_RUN_ID:-}" ]]; then
            echo "run-id=$INPUT_RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_id="$(gh run list \
            -R "$REPOSITORY" \
            --workflow "Build Windows Deps" \
            --branch "$BRANCH_NAME" \
            --json databaseId,conclusion,status \
            --limit 20 \
            | python -c 'import json,sys; runs=json.load(sys.stdin); print(next((str(r["databaseId"]) for r in runs if r.get("conclusion")=="success"), ""))')"

          if [[ -z "$run_id" ]]; then
            echo "No successful 'Build Windows Deps' run found for branch $BRANCH_NAME" >&2
            exit 1
          fi

          echo "run-id=$run_id" >> "$GITHUB_OUTPUT"

  cpp-ut-smoke:
    name: Cpp UT Smoke
    needs: resolve-deps-run
    runs-on: windows-latest
    env:
      DEPS_ZIP_DIR: ${{ github.workspace }}\deps-artifact
      DEPS_ROOT: ${{ github.workspace }}\deps\build\BambuStudio_dep
      BUILD_DIR: ${{ github.workspace }}\build-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: "true"

      - name: Download deps artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh run download ${{ needs.resolve-deps-run.outputs.run-id }} `
            -R ${{ github.repository }} `
            -n bambustudio-windows-deps `
            -D "${{ env.DEPS_ZIP_DIR }}"

      - name: Expand deps artifact
        shell: pwsh
        run: |
          $zip = Get-ChildItem "${{ env.DEPS_ZIP_DIR }}" -Filter *.zip | Select-Object -First 1
          if (-not $zip) {
            throw "No deps zip found under ${{ env.DEPS_ZIP_DIR }}"
          }
          if (Test-Path "${{ env.DEPS_ROOT }}") {
            Remove-Item -Recurse -Force "${{ env.DEPS_ROOT }}"
          }
          New-Item -ItemType Directory -Force -Path "${{ env.DEPS_ROOT }}" | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath "${{ env.DEPS_ROOT }}"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows build tooling
        shell: pwsh
        run: |
          choco install strawberryperl --no-progress -y
          choco install pkgconfiglite --no-progress -y

      - name: Detect Windows SDK
        id: windows_sdk
        shell: pwsh
        run: |
          $sdk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include" | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty Name
          if (-not $sdk) {
            throw "Windows SDK not found"
          }
          echo "sdk-version=$sdk" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Configure cpp smoke build
        shell: pwsh
        run: |
          if (Test-Path "${{ env.BUILD_DIR }}") {
            Remove-Item -Recurse -Force "${{ env.BUILD_DIR }}"
          }
          cmake -S . -B "${{ env.BUILD_DIR }}" `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DSLIC3R_GUI=OFF `
            -DSLIC3R_STATIC=ON `
            -DSLIC3R_BUILD_TESTS=ON `
            -DSLIC3R_MSVC_COMPILE_PARALLEL=OFF `
            -DSLIC3R_MSVC_PDB=OFF `
            -DCMAKE_PREFIX_PATH="${{ env.DEPS_ROOT }}\usr\local" `
            -DPKG_CONFIG_EXECUTABLE="C:/Strawberry/perl/bin/pkg-config.bat" `
            -DWIN10SDK_PATH="C:/Program Files (x86)/Windows Kits/10/Include/${{ steps.windows_sdk.outputs.sdk-version }}"

      - name: Build libslic3r smoke target
        shell: pwsh
        run: cmake --build "${{ env.BUILD_DIR }}" --config Release --target libslic3r_tests --parallel 1

      - name: Build fff_print smoke target
        shell: pwsh
        run: cmake --build "${{ env.BUILD_DIR }}" --config Release --target fff_print_tests --parallel 1

      - name: Run libslic3r config smoke
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .ci | Out-Null
          & "${{ env.BUILD_DIR }}\tests\libslic3r\Release\libslic3r_tests.exe" "[Config]" 2>&1 | Tee-Object -FilePath .ci\libslic3r-config.log

      - name: Run gcodewriter smoke
        shell: pwsh
        run: |
          & "${{ env.BUILD_DIR }}\tests\fff_print\Release\fff_print_tests.exe" "[GCodeWriter]" 2>&1 | Tee-Object -FilePath .ci\fff-gcodewriter.log

      - name: Run model smoke
        shell: pwsh
        run: |
          & "${{ env.BUILD_DIR }}\tests\fff_print\Release\fff_print_tests.exe" "[Model]" 2>&1 | Tee-Object -FilePath .ci\fff-model.log

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cpp-ut-smoke-logs
          path: .ci\*.log

      - name: Write summary
        if: always()
        shell: pwsh
        run: |
          @"
          ## Cpp UT Smoke

          - Branch: `${{ needs.resolve-deps-run.outputs.branch-name }}`
          - Deps run id: `${{ needs.resolve-deps-run.outputs.run-id }}`
          - Smoke set:
            - `libslic3r_tests.exe [Config]`
            - `fff_print_tests.exe [GCodeWriter]`
            - `fff_print_tests.exe [Model]`
          "@ | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
