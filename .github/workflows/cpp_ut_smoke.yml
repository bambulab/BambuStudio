              Xml = "support-material-layers-smoke.xml"
              Conclusion = "${{ steps.run_support_material_layers_smoke.conclusion }}"
            })
          }
          if ("${{ steps.smoke_scope.outputs.support_material_enabled }}" -eq "true") {
            $expected.Add(@{
              Name = "support_material_smoke_tests"
              Log = "support-material-smoke.log"
              Xml = "support-material-smoke.xml"
              Conclusion = "${{ steps.run_support_material_smoke.conclusion }}"
            })
          }
          if ("${{ steps.smoke_scope.outputs.trianglemesh_geometry_enabled }}" -eq "true") {
            $expected.Add(@{
              Name = "trianglemesh_geometry_smoke_tests"
              Log = "trianglemesh-geometry-smoke.log"
              Xml = "trianglemesh-geometry-smoke.xml"
              Conclusion = "${{ steps.run_trianglemesh_geometry_smoke.conclusion }}"
            })
          }

          $successfulSuites = New-Object System.Collections.Generic.List[string]
          $smokeRunFailed = New-Object System.Collections.Generic.List[string]
          $upstreamBlocked = New-Object System.Collections.Generic.List[string]
          $missing = New-Object System.Collections.Generic.List[string]
          $failedWithMissingEvidence = New-Object System.Collections.Generic.List[string]
          $uploadableFiles = New-Object System.Collections.Generic.List[string]
          foreach ($suite in $expected) {
            $logPath = Join-Path "${{ env.SMOKE_OUTPUT_DIR }}" $suite.Log
            $xmlPath = Join-Path "${{ env.SMOKE_OUTPUT_DIR }}" $suite.Xml
            $logExists = Test-Path $logPath
            $xmlExists = Test-Path $xmlPath

            if ($logExists) {
              $uploadableFiles.Add($logPath)
            }
            if ($xmlExists) {
              $uploadableFiles.Add($xmlPath)
            }

            if ($suite.Conclusion -eq "success") {
              $successfulSuites.Add($suite.Name)
              if (-not $logExists) {
                $missing.Add("$($suite.Name): missing log ($($suite.Log))")
              }
              if (-not $xmlExists) {
                $missing.Add("$($suite.Name): missing xml ($($suite.Xml))")
              }
              continue
            }

            if ($suite.Conclusion -eq "failure") {
              $present = New-Object System.Collections.Generic.List[string]
              if ($logExists) {
                $present.Add($suite.Log)
              }
              if ($xmlExists) {
                $present.Add($suite.Xml)
              }
              $presentText = if ($present.Count -gt 0) { $present -join ', ' } else { 'none' }
              if ($present.Count -lt 2) {
                $missingOnFailure = New-Object System.Collections.Generic.List[string]
                if (-not $logExists) {
                  $missingOnFailure.Add("missing log ($($suite.Log))")
                }
                if (-not $xmlExists) {
                  $missingOnFailure.Add("missing xml ($($suite.Xml))")
                }
                $failedWithMissingEvidence.Add("$($suite.Name): $($missingOnFailure -join '; ')")
              }
              $smokeRunFailed.Add("$($suite.Name): smoke_run_failed (present: $presentText)")
              continue
            }

            if ([string]::IsNullOrWhiteSpace($suite.Conclusion)) {
              $upstreamBlocked.Add("$($suite.Name): upstream_failure_or_not_reached (empty)")
            } else {
              $upstreamBlocked.Add("$($suite.Name): upstream_failure_or_not_reached ($($suite.Conclusion))")
            }
          }

          if ($uploadableFiles.Count -gt 0) {
            "files_ready=true" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          }

          if ($smokeRunFailed.Count -gt 0) {
            @(
              "## Smoke Output Verification"
              ""
              "- Result: diagnostic"
              "- Reason: smoke_run_failed"
              "- Directory: ${{ env.SMOKE_OUTPUT_DIR }}"
              "- Details: $($smokeRunFailed -join '; ')"
            ) | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          }

          if ($upstreamBlocked.Count -gt 0) {
            @(
              "## Smoke Output Verification"
              ""
              "- Result: skipped"
              "- Reason: upstream_failure_or_not_reached"
              "- Directory: ${{ env.SMOKE_OUTPUT_DIR }}"
              "- Details: $($upstreamBlocked -join '; ')"
            ) | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          }

          if ($missing.Count -gt 0 -or $failedWithMissingEvidence.Count -gt 0) {
            $details = @($missing + $failedWithMissingEvidence) -join '; '
            @(
              "## Smoke Output Verification"
              ""
              "- Result: failed"
              "- Reason: missing_expected_files"
              "- Directory: ${{ env.SMOKE_OUTPUT_DIR }}"
              "- Missing: $details"
            ) | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
            throw "Smoke output verification failed: missing_expected_files"
          }

          if ($uploadableFiles.Count -eq 0) {
            Write-Host "No uploadable smoke output files were found."
            exit 0
          }

          Write-Host "Smoke output files:"
          $uploadableFiles | Select-Object -Unique | ForEach-Object { Write-Host "  $_" }

      - name: Upload smoke logs
        if: always() && steps.smoke_verify.outputs.files_ready == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: cpp-ut-smoke-logs
          include-hidden-files: true
          if-no-files-found: error
          path: |
            .ci/smoke/*.log
