name: Cpp UT Smoke

on:
  workflow_dispatch:
    inputs:
      deps-run-id:
        description: "Optional Build Windows Deps run id"
        required: false
        type: string
  pull_request:
    branches:
      - master
    paths:
      - "src/**"
      - "tests/**"
      - "!tests/fff_print/LEGACY_MIGRATION.md"
      - "deps/**"
      - "**/CMakeLists.txt"
      - "build_win.bat"
      - ".github/config-fast-gate-paths.txt"
      - ".github/placeholder-parser-smoke-paths.txt"
      - ".github/gcode-reader-smoke-paths.txt"
      - ".github/gcodewriter-smoke-paths.txt"
      - ".github/model-assembly-smoke-paths.txt"
      - ".github/print-filament-mapping-smoke-paths.txt"
      - ".github/print-apply-validate-smoke-paths.txt"
      - ".github/print-perimeters-smoke-paths.txt"
      - ".github/print-process-math-smoke-paths.txt"
      - ".github/print-process-core-smoke-paths.txt"
      - ".github/print-object-layers-smoke-paths.txt"
      - ".github/print-adhesion-smoke-paths.txt"
      - ".github/fill-smoke-paths.txt"
      - ".github/support-material-layers-smoke-paths.txt"
      - ".github/support-material-smoke-paths.txt"
      - ".github/trianglemesh-geometry-smoke-paths.txt"
      - ".github/workflows/cpp_ut_smoke.yml"
      - ".github/workflows/deps_build.yml"
  push:
    branches:
      - "ci/**"
    paths:
      - "src/**"
      - "tests/**"
      - "!tests/fff_print/LEGACY_MIGRATION.md"
      - "deps/**"
      - "**/CMakeLists.txt"
      - "build_win.bat"
      - ".github/config-fast-gate-paths.txt"
      - ".github/placeholder-parser-smoke-paths.txt"
      - ".github/gcode-reader-smoke-paths.txt"
      - ".github/gcodewriter-smoke-paths.txt"
      - ".github/model-assembly-smoke-paths.txt"
      - ".github/print-filament-mapping-smoke-paths.txt"
      - ".github/print-apply-validate-smoke-paths.txt"
      - ".github/print-perimeters-smoke-paths.txt"
      - ".github/print-process-math-smoke-paths.txt"
      - ".github/print-process-core-smoke-paths.txt"
      - ".github/print-object-layers-smoke-paths.txt"
      - ".github/print-adhesion-smoke-paths.txt"
      - ".github/fill-smoke-paths.txt"
      - ".github/support-material-layers-smoke-paths.txt"
      - ".github/support-material-smoke-paths.txt"
      - ".github/trianglemesh-geometry-smoke-paths.txt"
      - ".github/workflows/cpp_ut_smoke.yml"
      - ".github/workflows/deps_build.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-deps-run:
    name: Resolve Deps Run
    runs-on: ubuntu-24.04
    outputs:
      run-id: ${{ steps.resolve.outputs.run-id }}
      branch-name: ${{ steps.resolve.outputs.branch-name }}
    steps:
      - name: Resolve deps run id
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RUN_ID: ${{ inputs.deps-run-id }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          echo "branch-name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          if [[ -n "${INPUT_RUN_ID:-}" ]]; then
            echo "run-id=$INPUT_RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_id="$(gh run list \
            -R "$REPOSITORY" \
            --workflow "Build Windows Deps" \
            --branch "$BRANCH_NAME" \
            --json databaseId,conclusion,status \
            --limit 20 \
            | python -c 'import json,sys; runs=json.load(sys.stdin); print(next((str(r["databaseId"]) for r in runs if r.get("conclusion")=="success"), ""))')"

          if [[ -z "$run_id" ]]; then
            echo "No successful 'Build Windows Deps' run found for branch $BRANCH_NAME" >&2
            exit 1
          fi

          echo "run-id=$run_id" >> "$GITHUB_OUTPUT"

  cpp-ut-smoke:
    name: Cpp UT Smoke
    needs: resolve-deps-run
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      DEPS_ZIP_DIR: ${{ github.workspace }}\deps-artifact
      DEPS_ROOT: ${{ github.workspace }}\deps\build\BambuStudio_dep
      BUILD_DIR: ${{ github.workspace }}\build-smoke
      SMOKE_OUTPUT_DIR: .ci\smoke
      BUILD_PARALLEL: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: "true"

      - name: Detect smoke gate scopes
        id: smoke_scope
        shell: pwsh
        run: |
          $changed = @()
          $changedText = "n/a"

          function Get-ScopeResult {
            param(
              [string[]]$ChangedFiles,
              [string]$PatternsPath
            )

            $patterns = Get-Content $PatternsPath |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) -and -not $_.Trim().StartsWith('#') } |
              ForEach-Object { $_.Trim() }

            $matched = New-Object System.Collections.Generic.List[string]
            foreach ($file in $ChangedFiles) {
              foreach ($pattern in $patterns) {
                if ($file -like $pattern) {
                  $matched.Add($file)
                  break
                }
              }
            }

            $matchedUnique = @($matched | Select-Object -Unique)
            return @{
              Enabled = ($matchedUnique.Count -gt 0)
              Reason  = if ($matchedUnique.Count -gt 0) { "matched_paths" } else { "no_matching_paths" }
              Matched = if ($matchedUnique.Count -gt 0) { $matchedUnique -join ', ' } else { 'n/a' }
            }
          }

          function Test-CMakeSourceListEntry {
            param([string]$Line)

            return $Line -match '^[A-Za-z0-9_./+-]+\.(c|cc|cpp|cxx|h|hpp)$'
          }

          function Get-CMakeScopesFromContext {
            param([string]$Context)

            $scopes = New-Object System.Collections.Generic.List[string]
            if ($Context -match 'libslic3r_print_process_math_core_sources|add_library\(libslic3r_print_process_math_core') {
              $scopes.Add('process_math')
              $scopes.Add('fill')
            } elseif ($Context -match 'libslic3r_fill_core_sources|add_library\(libslic3r_fill_core') {
              $scopes.Add('fill')
            } elseif ($Context -match 'libslic3r_trianglemesh_geometry_core_sources|add_library\(libslic3r_trianglemesh_geometry_core') {
              $scopes.Add('trianglemesh_geometry')
            } elseif ($Context -match 'libslic3r_print_object_layers_core_sources|add_library\(libslic3r_print_object_layers_core') {
              $scopes.Add('object_layers')
            } elseif ($Context -match 'libslic3r_print_process_core_sources|add_library\(libslic3r_print_process_core') {
              $scopes.Add('process_core')
            } elseif ($Context -match 'libslic3r_print_perimeters_core_sources|add_library\(libslic3r_print_perimeters_core') {
              $scopes.Add('perimeters')
              $scopes.Add('apply_validate')
              $scopes.Add('filament_mapping')
            } elseif ($Context -match 'libslic3r_print_apply_validate_core_sources|add_library\(libslic3r_print_apply_validate_core') {
              $scopes.Add('apply_validate')
              $scopes.Add('filament_mapping')
            } elseif ($Context -match 'libslic3r_print_filament_mapping_core_sources|add_library\(libslic3r_print_filament_mapping_core') {
              $scopes.Add('filament_mapping')
            }

            return @($scopes | Select-Object -Unique)
          }

          function Get-CentralCMakeScopeResult {
            param(
              [string]$BaseRef,
              [string]$Head
            )

            $enabled = @{
              process_math = $false
              fill = $false
              trianglemesh_geometry = $false
              object_layers = $false
              process_core = $false
              perimeters = $false
              apply_validate = $false
              filament_mapping = $false
            }
            $unknown = New-Object System.Collections.Generic.List[string]
            $matched = New-Object System.Collections.Generic.List[string]
            $currentScopes = @()
            $fullSourceListOnly = $false
            $diffLines = @(git diff --unified=0 $BaseRef $Head -- src/libslic3r/CMakeLists.txt)
            if ($LASTEXITCODE -ne 0) {
              return @{
                Classified = $false
                Reason = 'cmake_diff_failed'
                Matched = 'src/libslic3r/CMakeLists.txt'
                Enabled = $enabled
              }
            }

            foreach ($line in $diffLines) {
              if ($line -match '^@@ .* @@(?<context>.*)$') {
                $currentScopes = @(Get-CMakeScopesFromContext $matches.context)
                continue
              }
              if ($line -match '^(diff --git|index |--- |\+\+\+ )') {
                continue
              }
              if (-not ($line.StartsWith('+') -or $line.StartsWith('-'))) {
                continue
              }

              $changedLine = $line.Substring(1).Trim()
              if ([string]::IsNullOrWhiteSpace($changedLine) -or $changedLine.StartsWith('#')) {
                continue
              }

              if ($currentScopes.Count -gt 0) {
                foreach ($scope in $currentScopes) {
                  $enabled[$scope] = $true
                }
                $matched.Add("src/libslic3r/CMakeLists.txt:$changedLine")
                continue
              }

              if (($changedLine -match 'slic3r_sources') -or (Test-CMakeSourceListEntry $changedLine)) {
                # Full libslic3r source-list entries do not by themselves identify
                # a focused smoke boundary. Scoped smoke target source-list hunks in
                # the same diff will enable the concrete target(s) they affect.
                $fullSourceListOnly = $true
                $matched.Add("src/libslic3r/CMakeLists.txt:$changedLine")
                continue
              }

              $unknown.Add($changedLine)
            }

            if ($unknown.Count -gt 0) {
              return @{
                Classified = $false
                Reason = 'central_cmake_unclassified'
                Matched = "src/libslic3r/CMakeLists.txt: $($unknown -join '; ')"
                Enabled = $enabled
              }
            }

            if ($fullSourceListOnly -and -not ($enabled.Values -contains $true)) {
              return @{
                Classified = $false
                Reason = 'central_cmake_full_source_only'
                Matched = if ($matched.Count -gt 0) { ($matched | Select-Object -Unique) -join ', ' } else { 'src/libslic3r/CMakeLists.txt' }
                Enabled = $enabled
              }
            }

            return @{
              Classified = $true
              Reason = 'central_cmake_scoped'
              Matched = if ($matched.Count -gt 0) { ($matched | Select-Object -Unique) -join ', ' } else { 'src/libslic3r/CMakeLists.txt' }
              Enabled = $enabled
            }
          }

          $configEnabled = $true
          $configReason = "workflow_dispatch"
          $configMatched = "n/a"
          $placeholderParserEnabled = $true
          $placeholderParserReason = "workflow_dispatch"
          $placeholderParserMatched = "n/a"
          $gcodewriterEnabled = $true
          $gcodewriterReason = "workflow_dispatch"
          $gcodewriterMatched = "n/a"
          $gcodeReaderEnabled = $true
          $gcodeReaderReason = "workflow_dispatch"
          $gcodeReaderMatched = "n/a"
          $modelAssemblyEnabled = $true
          $modelAssemblyReason = "workflow_dispatch"
          $modelAssemblyMatched = "n/a"
          $filamentMappingEnabled = $true
          $filamentMappingReason = "workflow_dispatch"
          $filamentMappingMatched = "n/a"
          $applyValidateEnabled = $true
          $applyValidateReason = "workflow_dispatch"
          $applyValidateMatched = "n/a"
          $perimetersEnabled = $true
          $perimetersReason = "workflow_dispatch"
          $perimetersMatched = "n/a"
          $processMathEnabled = $true
          $processMathReason = "workflow_dispatch"
          $processMathMatched = "n/a"
          $processCoreEnabled = $true
          $processCoreReason = "workflow_dispatch"
          $processCoreMatched = "n/a"
          $objectLayersEnabled = $true
          $objectLayersReason = "workflow_dispatch"
          $objectLayersMatched = "n/a"
          $adhesionEnabled = $true
          $adhesionReason = "workflow_dispatch"
          $adhesionMatched = "n/a"
          $fillEnabled = $true
          $fillReason = "workflow_dispatch"
          $fillMatched = "n/a"
          $supportMaterialLayersEnabled = $true
          $supportMaterialLayersReason = "workflow_dispatch"
          $supportMaterialLayersMatched = "n/a"
          $supportMaterialEnabled = $true
          $supportMaterialReason = "workflow_dispatch"
          $supportMaterialMatched = "n/a"
          $trianglemeshGeometryEnabled = $true
          $trianglemeshGeometryReason = "workflow_dispatch"
          $trianglemeshGeometryMatched = "n/a"

          if ("${{ github.event_name }}" -ne "workflow_dispatch") {
            $baseRef = if ("${{ github.event_name }}" -eq "pull_request") {
              "${{ github.event.pull_request.base.sha }}"
            } else {
              "${{ github.event.before }}"
            }
            $head = "${{ github.sha }}"

            if ([string]::IsNullOrWhiteSpace($baseRef) -or $baseRef -match '^0+$') {
              $configReason = "missing_base_sha"
              $placeholderParserReason = "missing_base_sha"
              $gcodewriterReason = "missing_base_sha"
              $gcodeReaderReason = "missing_base_sha"
              $modelAssemblyReason = "missing_base_sha"
              $filamentMappingReason = "missing_base_sha"
              $applyValidateReason = "missing_base_sha"
              $perimetersReason = "missing_base_sha"
              $processMathReason = "missing_base_sha"
              $processCoreReason = "missing_base_sha"
              $objectLayersReason = "missing_base_sha"
              $adhesionReason = "missing_base_sha"
              $fillReason = "missing_base_sha"
              $supportMaterialLayersReason = "missing_base_sha"
              $supportMaterialReason = "missing_base_sha"
              $trianglemeshGeometryReason = "missing_base_sha"
            } else {
              git fetch --no-tags --depth=1 origin $baseRef | Out-Null
              if ($LASTEXITCODE -ne 0) {
                $configReason = "fetch_base_failed"
                $placeholderParserReason = "fetch_base_failed"
                $gcodewriterReason = "fetch_base_failed"
                $gcodeReaderReason = "fetch_base_failed"
                $modelAssemblyReason = "fetch_base_failed"
                $filamentMappingReason = "fetch_base_failed"
                $applyValidateReason = "fetch_base_failed"
                $perimetersReason = "fetch_base_failed"
                $processMathReason = "fetch_base_failed"
                $processCoreReason = "fetch_base_failed"
                $objectLayersReason = "fetch_base_failed"
                $adhesionReason = "fetch_base_failed"
                $fillReason = "fetch_base_failed"
                $supportMaterialLayersReason = "fetch_base_failed"
                $supportMaterialReason = "fetch_base_failed"
                $trianglemeshGeometryReason = "fetch_base_failed"
              } else {
                $changed = @(git diff --name-only FETCH_HEAD $head | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
                $changedText = if ($changed.Count -gt 0) { $changed -join ', ' } else { 'n/a' }

                $configScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/config-fast-gate-paths.txt"
                $placeholderParserScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/placeholder-parser-smoke-paths.txt"
                $gcodewriterScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/gcodewriter-smoke-paths.txt"
                $gcodeReaderScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/gcode-reader-smoke-paths.txt"
                $modelAssemblyScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/model-assembly-smoke-paths.txt"
                $filamentMappingScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/print-filament-mapping-smoke-paths.txt"
                $applyValidateScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/print-apply-validate-smoke-paths.txt"
                $perimetersScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/print-perimeters-smoke-paths.txt"
                $processMathScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/print-process-math-smoke-paths.txt"
                $processCoreScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/print-process-core-smoke-paths.txt"
                $objectLayersScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/print-object-layers-smoke-paths.txt"
                $adhesionScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/print-adhesion-smoke-paths.txt"
                $fillScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/fill-smoke-paths.txt"
                $supportMaterialLayersScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/support-material-layers-smoke-paths.txt"
                $supportMaterialScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/support-material-smoke-paths.txt"
                $trianglemeshGeometryScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/trianglemesh-geometry-smoke-paths.txt"

                $centralCMakeChanged = @($changed | Where-Object { $_ -eq "src/libslic3r/CMakeLists.txt" }).Count -gt 0

                $configEnabled = $configScope.Enabled
                $configReason = $configScope.Reason
                $configMatched = $configScope.Matched
                $placeholderParserEnabled = $placeholderParserScope.Enabled
                $placeholderParserReason = $placeholderParserScope.Reason
                $placeholderParserMatched = $placeholderParserScope.Matched
                $gcodewriterEnabled = $gcodewriterScope.Enabled
                $gcodewriterReason = $gcodewriterScope.Reason
                $gcodewriterMatched = $gcodewriterScope.Matched
                $gcodeReaderEnabled = $gcodeReaderScope.Enabled
                $gcodeReaderReason = $gcodeReaderScope.Reason
                $gcodeReaderMatched = $gcodeReaderScope.Matched
                $modelAssemblyEnabled = $modelAssemblyScope.Enabled
                $modelAssemblyReason = $modelAssemblyScope.Reason
                $modelAssemblyMatched = $modelAssemblyScope.Matched
                $filamentMappingEnabled = $filamentMappingScope.Enabled
                $filamentMappingReason = $filamentMappingScope.Reason
                $filamentMappingMatched = $filamentMappingScope.Matched
                $applyValidateEnabled = $applyValidateScope.Enabled
                $applyValidateReason = $applyValidateScope.Reason
                $applyValidateMatched = $applyValidateScope.Matched
                $perimetersEnabled = $perimetersScope.Enabled
                $perimetersReason = $perimetersScope.Reason
                $perimetersMatched = $perimetersScope.Matched
                $processMathEnabled = $processMathScope.Enabled
                $processMathReason = $processMathScope.Reason
                $processMathMatched = $processMathScope.Matched
                $processCoreEnabled = $processCoreScope.Enabled
                $processCoreReason = $processCoreScope.Reason
                $processCoreMatched = $processCoreScope.Matched
                $objectLayersEnabled = $objectLayersScope.Enabled
                $objectLayersReason = $objectLayersScope.Reason
                $objectLayersMatched = $objectLayersScope.Matched
                $adhesionEnabled = $adhesionScope.Enabled
                $adhesionReason = $adhesionScope.Reason
                $adhesionMatched = $adhesionScope.Matched
                $fillEnabled = $fillScope.Enabled
                $fillReason = $fillScope.Reason
                $fillMatched = $fillScope.Matched
                $supportMaterialLayersEnabled = $supportMaterialLayersScope.Enabled
                $supportMaterialLayersReason = $supportMaterialLayersScope.Reason
                $supportMaterialLayersMatched = $supportMaterialLayersScope.Matched
                $supportMaterialEnabled = $supportMaterialScope.Enabled
                $supportMaterialReason = $supportMaterialScope.Reason
                $supportMaterialMatched = $supportMaterialScope.Matched
                $trianglemeshGeometryEnabled = $trianglemeshGeometryScope.Enabled
                $trianglemeshGeometryReason = $trianglemeshGeometryScope.Reason
                $trianglemeshGeometryMatched = $trianglemeshGeometryScope.Matched

                if ($centralCMakeChanged) {
                  $cmakeScope = Get-CentralCMakeScopeResult -BaseRef FETCH_HEAD -Head $head
                  if ($cmakeScope.Classified) {
                    if ($cmakeScope.Enabled.filament_mapping -and -not $filamentMappingEnabled) {
                      $filamentMappingEnabled = $true
                      $filamentMappingReason = $cmakeScope.Reason
                      $filamentMappingMatched = $cmakeScope.Matched
                    }
                    if ($cmakeScope.Enabled.apply_validate -and -not $applyValidateEnabled) {
                      $applyValidateEnabled = $true
                      $applyValidateReason = $cmakeScope.Reason
                      $applyValidateMatched = $cmakeScope.Matched
                    }
                    if ($cmakeScope.Enabled.perimeters -and -not $perimetersEnabled) {
                      $perimetersEnabled = $true
                      $perimetersReason = $cmakeScope.Reason
                      $perimetersMatched = $cmakeScope.Matched
                    }
                    if ($cmakeScope.Enabled.process_math -and -not $processMathEnabled) {
                      $processMathEnabled = $true
                      $processMathReason = $cmakeScope.Reason
                      $processMathMatched = $cmakeScope.Matched
                    }
                    if ($cmakeScope.Enabled.process_core -and -not $processCoreEnabled) {
                      $processCoreEnabled = $true
                      $processCoreReason = $cmakeScope.Reason
                      $processCoreMatched = $cmakeScope.Matched
                    }
                    if ($cmakeScope.Enabled.object_layers -and -not $objectLayersEnabled) {
                      $objectLayersEnabled = $true
                      $objectLayersReason = $cmakeScope.Reason
                      $objectLayersMatched = $cmakeScope.Matched
                    }
                    if ($cmakeScope.Enabled.fill -and -not $fillEnabled) {
                      $fillEnabled = $true
                      $fillReason = $cmakeScope.Reason
                      $fillMatched = $cmakeScope.Matched
                    }
                    if ($cmakeScope.Enabled.trianglemesh_geometry -and -not $trianglemeshGeometryEnabled) {
                      $trianglemeshGeometryEnabled = $true
                      $trianglemeshGeometryReason = $cmakeScope.Reason
                      $trianglemeshGeometryMatched = $cmakeScope.Matched
                    }
                  } else {
                    $configEnabled = $true
                    $placeholderParserEnabled = $true
                    $gcodewriterEnabled = $true
                    $gcodeReaderEnabled = $true
                    $modelAssemblyEnabled = $true
                    $filamentMappingEnabled = $true
                    $applyValidateEnabled = $true
                    $perimetersEnabled = $true
                    $processMathEnabled = $true
                    $processCoreEnabled = $true
                    $objectLayersEnabled = $true
                    $adhesionEnabled = $true
                    $fillEnabled = $true
                    $supportMaterialLayersEnabled = $true
                    $supportMaterialEnabled = $true
                    $trianglemeshGeometryEnabled = $true

                    $configReason = $cmakeScope.Reason
                    $placeholderParserReason = $cmakeScope.Reason
                    $gcodewriterReason = $cmakeScope.Reason
                    $gcodeReaderReason = $cmakeScope.Reason
                    $modelAssemblyReason = $cmakeScope.Reason
                    $filamentMappingReason = $cmakeScope.Reason
                    $applyValidateReason = $cmakeScope.Reason
                    $perimetersReason = $cmakeScope.Reason
                    $processMathReason = $cmakeScope.Reason
                    $processCoreReason = $cmakeScope.Reason
                    $objectLayersReason = $cmakeScope.Reason
                    $adhesionReason = $cmakeScope.Reason
                    $fillReason = $cmakeScope.Reason
                    $supportMaterialLayersReason = $cmakeScope.Reason
                    $supportMaterialReason = $cmakeScope.Reason
                    $trianglemeshGeometryReason = $cmakeScope.Reason

                    $configMatched = $cmakeScope.Matched
                    $placeholderParserMatched = $cmakeScope.Matched
                    $gcodewriterMatched = $cmakeScope.Matched
                    $gcodeReaderMatched = $cmakeScope.Matched
                    $modelAssemblyMatched = $cmakeScope.Matched
                    $filamentMappingMatched = $cmakeScope.Matched
                    $applyValidateMatched = $cmakeScope.Matched
                    $perimetersMatched = $cmakeScope.Matched
                    $processMathMatched = $cmakeScope.Matched
                    $processCoreMatched = $cmakeScope.Matched
                    $objectLayersMatched = $cmakeScope.Matched
                    $adhesionMatched = $cmakeScope.Matched
                    $fillMatched = $cmakeScope.Matched
                    $supportMaterialLayersMatched = $cmakeScope.Matched
                    $supportMaterialMatched = $cmakeScope.Matched
                    $trianglemeshGeometryMatched = $cmakeScope.Matched
                  }
                }
              }
            }
          }

          $anyEnabled = $configEnabled -or $placeholderParserEnabled -or $gcodewriterEnabled -or $gcodeReaderEnabled -or $modelAssemblyEnabled -or $filamentMappingEnabled -or $applyValidateEnabled -or $perimetersEnabled -or $processMathEnabled -or $processCoreEnabled -or $objectLayersEnabled -or $adhesionEnabled -or $fillEnabled -or $supportMaterialLayersEnabled -or $supportMaterialEnabled -or $trianglemeshGeometryEnabled
          "any_enabled=$($anyEnabled.ToString().ToLower())" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "changed=$changedText" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "config_enabled=$($configEnabled.ToString().ToLower())" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "config_reason=$configReason" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "config_matched=$configMatched" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "placeholder_parser_enabled=$($placeholderParserEnabled.ToString().ToLower())" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "placeholder_parser_reason=$placeholderParserReason" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "placeholder_parser_matched=$placeholderParserMatched" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "gcodewriter_enabled=$($gcodewriterEnabled.ToString().ToLower())" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "gcodewriter_reason=$gcodewriterReason" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "gcodewriter_matched=$gcodewriterMatched" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "gcode_reader_enabled=$($gcodeReaderEnabled.ToString().ToLower())" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
