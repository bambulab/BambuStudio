name: Cpp UT Smoke

on:
  workflow_dispatch:
    inputs:
      deps-run-id:
        description: "Optional Build Windows Deps run id"
        required: false
        type: string
  pull_request:
    branches:
      - master
  push:
    branches:
      - "ci/**"
    paths:
      - "src/**"
      - "tests/**"
      - "deps/**"
      - "**/CMakeLists.txt"
      - "build_win.bat"
      - ".github/workflows/cpp_ut_smoke.yml"
      - ".github/workflows/deps_build.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-deps-run:
    name: Resolve Deps Run
    runs-on: ubuntu-24.04
    outputs:
      run-id: ${{ steps.resolve.outputs.run-id }}
      branch-name: ${{ steps.resolve.outputs.branch-name }}
    steps:
      - name: Resolve deps run id
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RUN_ID: ${{ inputs.deps-run-id }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          echo "branch-name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          if [[ -n "${INPUT_RUN_ID:-}" ]]; then
            echo "run-id=$INPUT_RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          run_id="$(gh run list \
            -R "$REPOSITORY" \
            --workflow "Build Windows Deps" \
            --branch "$BRANCH_NAME" \
            --json databaseId,conclusion,status \
            --limit 20 \
            | python -c 'import json,sys; runs=json.load(sys.stdin); print(next((str(r["databaseId"]) for r in runs if r.get("conclusion")=="success"), ""))')"

          if [[ -z "$run_id" ]]; then
            echo "No successful 'Build Windows Deps' run found for branch $BRANCH_NAME" >&2
            exit 1
          fi

          echo "run-id=$run_id" >> "$GITHUB_OUTPUT"

  cpp-ut-smoke:
    name: Cpp UT Smoke
    needs: resolve-deps-run
    runs-on: windows-latest
    env:
      DEPS_ZIP_DIR: ${{ github.workspace }}\deps-artifact
      DEPS_ROOT: ${{ github.workspace }}\deps\build\BambuStudio_dep
      BUILD_DIR: ${{ github.workspace }}\build-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: "true"

      - name: Detect smoke gate scopes
        id: smoke_scope
        shell: pwsh
        run: |
          $changed = @()
          $changedText = "n/a"

          function Get-ScopeResult {
            param(
              [string[]]$ChangedFiles,
              [string]$PatternsPath
            )

            $patterns = Get-Content $PatternsPath |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) -and -not $_.Trim().StartsWith('#') } |
              ForEach-Object { $_.Trim() }

            $matched = New-Object System.Collections.Generic.List[string]
            foreach ($file in $ChangedFiles) {
              foreach ($pattern in $patterns) {
                if ($file -like $pattern) {
                  $matched.Add($file)
                  break
                }
              }
            }

            $matchedUnique = @($matched | Select-Object -Unique)
            return @{
              Enabled = ($matchedUnique.Count -gt 0)
              Reason  = if ($matchedUnique.Count -gt 0) { "matched_paths" } else { "no_matching_paths" }
              Matched = if ($matchedUnique.Count -gt 0) { $matchedUnique -join ', ' } else { 'n/a' }
            }
          }

          $configEnabled = $true
          $configReason = "workflow_dispatch"
          $configMatched = "n/a"
          $gcodewriterEnabled = $true
          $gcodewriterReason = "workflow_dispatch"
          $gcodewriterMatched = "n/a"
          $modelAssemblyEnabled = $true
          $modelAssemblyReason = "workflow_dispatch"
          $modelAssemblyMatched = "n/a"
          $fffEnabled = $true
          $fffReason = "workflow_dispatch"
          $fffMatched = "n/a"

          if ("${{ github.event_name }}" -ne "workflow_dispatch") {
            $base = if ("${{ github.event_name }}" -eq "pull_request") {
              "${{ github.event.pull_request.base.sha }}"
            } else {
              "${{ github.event.before }}"
            }
            $head = "${{ github.sha }}"

            if ([string]::IsNullOrWhiteSpace($base) -or $base -match '^0+$') {
              $configReason = "missing_base_sha"
              $gcodewriterReason = "missing_base_sha"
              $modelAssemblyReason = "missing_base_sha"
              $fffReason = "missing_base_sha"
            } else {
              git fetch --no-tags --depth=1 origin $base | Out-Null
              if ($LASTEXITCODE -ne 0) {
                $configReason = "fetch_base_failed"
                $gcodewriterReason = "fetch_base_failed"
                $modelAssemblyReason = "fetch_base_failed"
                $fffReason = "fetch_base_failed"
              } else {
                $changed = @(git diff --name-only $base $head | Where-Object { -not [string]::IsNullOrWhiteSpace($_) })
                $changedText = if ($changed.Count -gt 0) { $changed -join ', ' } else { 'n/a' }

                $configScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/config-fast-gate-paths.txt"
                $gcodewriterScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/gcodewriter-smoke-paths.txt"
                $modelAssemblyScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/model-assembly-smoke-paths.txt"
                $fffScope = Get-ScopeResult -ChangedFiles $changed -PatternsPath ".github/fff-print-smoke-paths.txt"

                $configEnabled = $configScope.Enabled
                $configReason = $configScope.Reason
                $configMatched = $configScope.Matched
                $gcodewriterEnabled = $gcodewriterScope.Enabled
                $gcodewriterReason = $gcodewriterScope.Reason
                $gcodewriterMatched = $gcodewriterScope.Matched
                $modelAssemblyEnabled = $modelAssemblyScope.Enabled
                $modelAssemblyReason = $modelAssemblyScope.Reason
                $modelAssemblyMatched = $modelAssemblyScope.Matched
                $fffEnabled = $fffScope.Enabled
                $fffReason = $fffScope.Reason
                $fffMatched = $fffScope.Matched
              }
            }
          }

          $anyEnabled = $configEnabled -or $gcodewriterEnabled -or $modelAssemblyEnabled -or $fffEnabled
          "any_enabled=$($anyEnabled.ToString().ToLower())" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "changed=$changedText" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "config_enabled=$($configEnabled.ToString().ToLower())" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "config_reason=$configReason" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "config_matched=$configMatched" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "gcodewriter_enabled=$($gcodewriterEnabled.ToString().ToLower())" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "gcodewriter_reason=$gcodewriterReason" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "gcodewriter_matched=$gcodewriterMatched" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "model_assembly_enabled=$($modelAssemblyEnabled.ToString().ToLower())" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "model_assembly_reason=$modelAssemblyReason" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "model_assembly_matched=$modelAssemblyMatched" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "fff_enabled=$($fffEnabled.ToString().ToLower())" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "fff_reason=$fffReason" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "fff_matched=$fffMatched" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

          Write-Host "smoke any_enabled=$anyEnabled"
          if ($changed.Count -gt 0) {
            Write-Host "changed files:"
            $changed | ForEach-Object { Write-Host "  $_" }
          }
          Write-Host "config gate enabled=$configEnabled reason=$configReason matched=$configMatched"
          Write-Host "gcodewriter smoke gate enabled=$gcodewriterEnabled reason=$gcodewriterReason matched=$gcodewriterMatched"
          Write-Host "model assembly smoke gate enabled=$modelAssemblyEnabled reason=$modelAssemblyReason matched=$modelAssemblyMatched"
          Write-Host "fff smoke gate enabled=$fffEnabled reason=$fffReason matched=$fffMatched"

      - name: Setup MSVC developer command prompt
        if: steps.smoke_scope.outputs.any_enabled == 'true'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Show build tool versions
        if: steps.smoke_scope.outputs.any_enabled == 'true'
        shell: pwsh
        run: |
          cmake --version
          ninja --version
          where.exe cl

      - name: Download deps artifact
        if: steps.smoke_scope.outputs.any_enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh run download ${{ needs.resolve-deps-run.outputs.run-id }} `
            -R ${{ github.repository }} `
            -n bambustudio-windows-deps `
            -D "${{ env.DEPS_ZIP_DIR }}"

      - name: Expand deps artifact
        if: steps.smoke_scope.outputs.any_enabled == 'true'
        shell: pwsh
        run: |
          $zip = Get-ChildItem "${{ env.DEPS_ZIP_DIR }}" -Filter *.zip | Select-Object -First 1
          if (-not $zip) {
            throw "No deps zip found under ${{ env.DEPS_ZIP_DIR }}"
          }
          if (Test-Path "${{ env.DEPS_ROOT }}") {
            Remove-Item -Recurse -Force "${{ env.DEPS_ROOT }}"
          }
          New-Item -ItemType Directory -Force -Path "${{ env.DEPS_ROOT }}" | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath "${{ env.DEPS_ROOT }}"

      - name: Install Windows build tooling
        if: steps.smoke_scope.outputs.any_enabled == 'true'
        shell: pwsh
        run: |
          choco install strawberryperl --no-progress -y
          choco install pkgconfiglite --no-progress -y

      - name: Detect Windows SDK
        if: steps.smoke_scope.outputs.any_enabled == 'true'
        id: windows_sdk
        shell: pwsh
        run: |
          $sdk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include" | Sort-Object Name -Descending | Select-Object -First 1 -ExpandProperty Name
          if (-not $sdk) {
            throw "Windows SDK not found"
          }
          echo "sdk-version=$sdk" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Configure cpp smoke build
        if: steps.smoke_scope.outputs.any_enabled == 'true'
        shell: pwsh
        run: |
          if (Test-Path "${{ env.BUILD_DIR }}") {
            Remove-Item -Recurse -Force "${{ env.BUILD_DIR }}"
          }
          $cl = Join-Path $env:VCToolsInstallDir "bin\Hostx64\x64\cl.exe"
          if (-not (Test-Path $cl)) {
            throw "MSVC compiler not found at $cl"
          }
          $sdkBin = "C:\Program Files (x86)\Windows Kits\10\bin\${{ steps.windows_sdk.outputs.sdk-version }}\x64"
          $rc = Join-Path $sdkBin "rc.exe"
          $mt = Join-Path $sdkBin "mt.exe"
          if (-not (Test-Path $rc)) {
            throw "Windows resource compiler not found at $rc"
          }
          if (-not (Test-Path $mt)) {
            throw "Windows manifest tool not found at $mt"
          }
          $cl = $cl -replace "\\","/"
          $rc = $rc -replace "\\","/"
          $mt = $mt -replace "\\","/"
          cmake -S . -B "${{ env.BUILD_DIR }}" `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER="$cl" `
            -DCMAKE_CXX_COMPILER="$cl" `
            -DCMAKE_RC_COMPILER="$rc" `
            -DCMAKE_MT="$mt" `
            -DSLIC3R_GUI=OFF `
            -DSLIC3R_STATIC=ON `
            -DSLIC3R_BUILD_TESTS=ON `
            -DSLIC3R_MSVC_COMPILE_PARALLEL=OFF `
            -DSLIC3R_MSVC_PDB=OFF `
            -DCMAKE_PREFIX_PATH="${{ env.DEPS_ROOT }}\usr\local" `
            -DPKG_CONFIG_EXECUTABLE="C:/Strawberry/perl/bin/pkg-config.bat" `
            -DWIN10SDK_PATH="C:/Program Files (x86)/Windows Kits/10/Include/${{ steps.windows_sdk.outputs.sdk-version }}"

      - name: Build libslic3r config fast target
        if: steps.smoke_scope.outputs.config_enabled == 'true'
        shell: pwsh
        run: cmake --build "${{ env.BUILD_DIR }}" --target libslic3r_config_tests --parallel 1

      - name: Build gcodewriter smoke target
        if: steps.smoke_scope.outputs.gcodewriter_enabled == 'true'
        shell: pwsh
        run: cmake --build "${{ env.BUILD_DIR }}" --target gcodewriter_smoke_tests --parallel 1

      - name: Build model assembly smoke target
        if: steps.smoke_scope.outputs.model_assembly_enabled == 'true'
        shell: pwsh
        run: cmake --build "${{ env.BUILD_DIR }}" --target model_basic_smoke_tests --parallel 1

      - name: Build print process smoke target
        if: steps.smoke_scope.outputs.fff_enabled == 'true'
        shell: pwsh
        run: cmake --build "${{ env.BUILD_DIR }}" --target print_process_smoke_tests --parallel 1

      - name: Add deps runtime DLLs to PATH
        if: steps.smoke_scope.outputs.any_enabled == 'true'
        shell: pwsh
        run: |
          "${{ env.DEPS_ROOT }}\usr\local\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          "${{ env.DEPS_ROOT }}\usr\local\bin\occt" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          "${{ env.DEPS_ROOT }}\usr\local\x64\vc17\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Run libslic3r config fast target
        if: steps.smoke_scope.outputs.config_enabled == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .ci | Out-Null
          $exe = "${{ env.BUILD_DIR }}\tests\libslic3r\libslic3r_config_tests.exe"
          & $exe "[ConfigCore]" 2>&1 | Tee-Object -FilePath .ci\libslic3r-config-fast.log
          & $exe -r junit -o .ci\libslic3r-config-fast.xml "[ConfigCore]" | Out-Null

      - name: Note skipped config fast target
        if: steps.smoke_scope.outputs.config_enabled != 'true'
        shell: pwsh
        run: |
          @"
          ## Config Fast Gate

          - Enabled: `false`
          - Reason: `${{ steps.smoke_scope.outputs.config_reason }}`
          - Changed files: `${{ steps.smoke_scope.outputs.changed }}`
          - Matched files: `${{ steps.smoke_scope.outputs.config_matched }}`
          "@ | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

      - name: Run gcodewriter smoke
        if: steps.smoke_scope.outputs.gcodewriter_enabled == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .ci | Out-Null
          $exe = "${{ env.BUILD_DIR }}\tests\fff_print\gcodewriter_smoke_tests.exe"
          & $exe "[GCodeWriter]" 2>&1 | Tee-Object -FilePath .ci\gcodewriter-smoke.log
          & $exe -r junit -o .ci\gcodewriter-smoke.xml "[GCodeWriter]" | Out-Null

      - name: Note skipped gcodewriter smoke target
        if: steps.smoke_scope.outputs.gcodewriter_enabled != 'true'
        shell: pwsh
        run: |
          @"
          ## GCodeWriter Smoke Gate

          - Enabled: `false`
          - Reason: `${{ steps.smoke_scope.outputs.gcodewriter_reason }}`
          - Changed files: `${{ steps.smoke_scope.outputs.changed }}`
          - Matched files: `${{ steps.smoke_scope.outputs.gcodewriter_matched }}`
          "@ | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

      - name: Run model assembly smoke
        if: steps.smoke_scope.outputs.model_assembly_enabled == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .ci | Out-Null
          $exe = "${{ env.BUILD_DIR }}\tests\fff_print\model_basic_smoke_tests.exe"
          & $exe "[ModelAssembly]" 2>&1 | Tee-Object -FilePath .ci\model-assembly-smoke.log
          & $exe -r junit -o .ci\model-assembly-smoke.xml "[ModelAssembly]" | Out-Null

      - name: Note skipped model assembly smoke target
        if: steps.smoke_scope.outputs.model_assembly_enabled != 'true'
        shell: pwsh
        run: |
          @"
          ## Model Assembly Smoke Gate

          - Enabled: `false`
          - Reason: `${{ steps.smoke_scope.outputs.model_assembly_reason }}`
          - Changed files: `${{ steps.smoke_scope.outputs.changed }}`
          - Matched files: `${{ steps.smoke_scope.outputs.model_assembly_matched }}`
          "@ | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

      - name: Note skipped print process smoke target
        if: steps.smoke_scope.outputs.fff_enabled != 'true'
        shell: pwsh
        run: |
          @"
          ## Print Process Smoke Gate

          - Enabled: `false`
          - Reason: `${{ steps.smoke_scope.outputs.fff_reason }}`
          - Changed files: `${{ steps.smoke_scope.outputs.changed }}`
          - Matched files: `${{ steps.smoke_scope.outputs.fff_matched }}`
          "@ | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

      - name: Run print process smoke
        if: steps.smoke_scope.outputs.fff_enabled == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .ci | Out-Null
          $exe = "${{ env.BUILD_DIR }}\tests\fff_print\print_process_smoke_tests.exe"
          & $exe "[PrintProcess]" 2>&1 | Tee-Object -FilePath .ci\print-process-smoke.log
          & $exe -r junit -o .ci\print-process-smoke.xml "[PrintProcess]" | Out-Null

      - name: Upload smoke logs
        if: always() && steps.smoke_scope.outputs.any_enabled == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: cpp-ut-smoke-logs
          path: |
            .ci\*.log
            .ci\*.xml

      - name: Write summary
        if: always()
        shell: pwsh
        run: |
          $configFastEnabled = "${{ steps.smoke_scope.outputs.config_enabled }}" -eq "true"
          $configFastReason = "${{ steps.smoke_scope.outputs.config_reason }}"
          $gcodewriterSmokeEnabled = "${{ steps.smoke_scope.outputs.gcodewriter_enabled }}" -eq "true"
          $gcodewriterSmokeReason = "${{ steps.smoke_scope.outputs.gcodewriter_reason }}"
          $modelAssemblyEnabled = "${{ steps.smoke_scope.outputs.model_assembly_enabled }}" -eq "true"
          $modelAssemblyReason = "${{ steps.smoke_scope.outputs.model_assembly_reason }}"
          $fffSmokeEnabled = "${{ steps.smoke_scope.outputs.fff_enabled }}" -eq "true"
          $fffSmokeReason = "${{ steps.smoke_scope.outputs.fff_reason }}"
          $suiteMeta = @(
            @{ Name = "libslic3r_config_tests [ConfigCore]"; Log = ".ci\libslic3r-config-fast.log"; Xml = ".ci\libslic3r-config-fast.xml" },
            @{ Name = "gcodewriter_smoke_tests [GCodeWriter]"; Log = ".ci\gcodewriter-smoke.log"; Xml = ".ci\gcodewriter-smoke.xml" },
            @{ Name = "model_basic_smoke_tests [ModelAssembly]"; Log = ".ci\model-assembly-smoke.log"; Xml = ".ci\model-assembly-smoke.xml" },
            @{ Name = "print_process_smoke_tests [PrintProcess]"; Log = ".ci\print-process-smoke.log"; Xml = ".ci\print-process-smoke.xml" }
          )

          $rows = New-Object System.Collections.Generic.List[string]
          $totalCases = 0
          $totalAssertions = 0
          $passedSuites = 0
          $eligibleSuites = 0

          foreach ($suite in $suiteMeta) {
            if ($suite.Name -like 'libslic3r_config_tests*' -and -not $configFastEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($configFastReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'gcodewriter_smoke_tests*' -and -not $gcodewriterSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($gcodewriterSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'model_basic_smoke_tests*' -and -not $modelAssemblyEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($modelAssemblyReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'print_process_smoke_tests*' -and -not $fffSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($fffSmokeReason) | 0 | 0 |")
              continue
            }

            $eligibleSuites += 1
            $cases = 0
            $assertions = 0
            if (Test-Path $suite.Log) {
              $logText = Get-Content $suite.Log -Raw
              if ($logText -match 'All tests passed \((?<assertions>\d+) assertion[s]? in (?<cases>\d+) test case[s]?\)') {
                $cases = [int]$matches.cases
                $assertions = [int]$matches.assertions
              }
            }

            if (($cases -eq 0 -or $assertions -eq 0) -and (Test-Path $suite.Xml)) {
              [xml]$xml = Get-Content $suite.Xml
              $suiteNode = $xml.testsuites.testsuite
              if ($suiteNode) {
                $cases = [int]$suiteNode.testcase.Count
              }
            }

            if ($cases -gt 0 -or $assertions -gt 0) {
              $passedSuites += 1
            }
            $totalCases += $cases
            $totalAssertions += $assertions
            $rows.Add("| $($suite.Name) | ran | $cases | $assertions |")
          }

          @"
          ## Cpp UT Smoke

          - Branch: `${{ needs.resolve-deps-run.outputs.branch-name }}`
          - Deps run id: `${{ needs.resolve-deps-run.outputs.run-id }}`
          - Changed files: `${{ steps.smoke_scope.outputs.changed }}`
          - Config fast gate enabled: `$configFastEnabled`
          - Config fast gate reason: `$configFastReason`
          - GCodeWriter smoke gate enabled: `$gcodewriterSmokeEnabled`
          - GCodeWriter smoke gate reason: `$gcodewriterSmokeReason`
          - Model assembly smoke gate enabled: `$modelAssemblyEnabled`
          - Model assembly smoke gate reason: `$modelAssemblyReason`
          - Print process smoke gate enabled: `$fffSmokeEnabled`
          - Print process smoke gate reason: `$fffSmokeReason`
          - Smoke commands passed: `$passedSuites / $eligibleSuites`
          - Reported test cases: `$totalCases`
          - Reported assertions: `$totalAssertions`

          | Suite | Status | Test Cases | Assertions |
          | --- | --- | ---: | ---: |
          $($rows -join "`n")
          "@ | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
