          $perimetersSmokeReason = "${{ steps.smoke_scope.outputs.perimeters_reason }}"
          $processMathSmokeEnabled = "${{ steps.smoke_scope.outputs.process_math_enabled }}" -eq "true"
          $processMathSmokeReason = "${{ steps.smoke_scope.outputs.process_math_reason }}"
          $processCoreSmokeEnabled = "${{ steps.smoke_scope.outputs.process_core_enabled }}" -eq "true"
          $processCoreSmokeReason = "${{ steps.smoke_scope.outputs.process_core_reason }}"
          $objectLayersSmokeEnabled = "${{ steps.smoke_scope.outputs.object_layers_enabled }}" -eq "true"
          $objectLayersSmokeReason = "${{ steps.smoke_scope.outputs.object_layers_reason }}"
          $adhesionSmokeEnabled = "${{ steps.smoke_scope.outputs.adhesion_enabled }}" -eq "true"
          $adhesionSmokeReason = "${{ steps.smoke_scope.outputs.adhesion_reason }}"
          $fillSmokeEnabled = "${{ steps.smoke_scope.outputs.fill_enabled }}" -eq "true"
          $fillSmokeReason = "${{ steps.smoke_scope.outputs.fill_reason }}"
          $supportMaterialLayersSmokeEnabled = "${{ steps.smoke_scope.outputs.support_material_layers_enabled }}" -eq "true"
          $supportMaterialLayersSmokeReason = "${{ steps.smoke_scope.outputs.support_material_layers_reason }}"
          $supportMaterialSmokeEnabled = "${{ steps.smoke_scope.outputs.support_material_enabled }}" -eq "true"
          $supportMaterialSmokeReason = "${{ steps.smoke_scope.outputs.support_material_reason }}"
          $trianglemeshGeometrySmokeEnabled = "${{ steps.smoke_scope.outputs.trianglemesh_geometry_enabled }}" -eq "true"
          $trianglemeshGeometrySmokeReason = "${{ steps.smoke_scope.outputs.trianglemesh_geometry_reason }}"
          $suiteMeta = @(
            @{ Name = "libslic3r_config_tests [ConfigCore]"; Log = ".ci/smoke/libslic3r-config-fast.log"; Xml = ".ci/smoke/libslic3r-config-fast.xml" },
            @{ Name = "placeholder_parser_smoke_tests [PlaceholderParser]"; Log = ".ci/smoke/placeholder-parser-smoke.log"; Xml = ".ci/smoke/placeholder-parser-smoke.xml" },
            @{ Name = "gcodewriter_smoke_tests [GCodeWriter]"; Log = ".ci/smoke/gcodewriter-smoke.log"; Xml = ".ci/smoke/gcodewriter-smoke.xml" },
            @{ Name = "gcode_reader_smoke_tests [GCodeReader]"; Log = ".ci/smoke/gcode-reader-smoke.log"; Xml = ".ci/smoke/gcode-reader-smoke.xml" },
            @{ Name = "model_basic_smoke_tests [ModelAssembly]"; Log = ".ci/smoke/model-assembly-smoke.log"; Xml = ".ci/smoke/model-assembly-smoke.xml" },
            @{ Name = "print_filament_mapping_smoke_tests [PrintFilamentMapping]"; Log = ".ci/smoke/print-filament-mapping-smoke.log"; Xml = ".ci/smoke/print-filament-mapping-smoke.xml" },
            @{ Name = "print_apply_validate_smoke_tests [PrintApplyValidate]"; Log = ".ci/smoke/print-apply-validate-smoke.log"; Xml = ".ci/smoke/print-apply-validate-smoke.xml" },
            @{ Name = "print_perimeters_stage_smoke_tests [PrintPerimeters]"; Log = ".ci/smoke/print-perimeters-smoke.log"; Xml = ".ci/smoke/print-perimeters-smoke.xml" },
            @{ Name = "print_process_math_smoke_tests [PrintProcessMath]"; Log = ".ci/smoke/print-process-math-smoke.log"; Xml = ".ci/smoke/print-process-math-smoke.xml" },
            @{ Name = "print_process_core_smoke_tests [PrintProcessCore]"; Log = ".ci/smoke/print-process-core-smoke.log"; Xml = ".ci/smoke/print-process-core-smoke.xml" },
            @{ Name = "print_object_layers_smoke_tests [PrintObjectLayers]"; Log = ".ci/smoke/print-object-layers-smoke.log"; Xml = ".ci/smoke/print-object-layers-smoke.xml" },
            @{ Name = "print_adhesion_smoke_tests [PrintSkirtBrim]"; Log = ".ci/smoke/print-adhesion-smoke.log"; Xml = ".ci/smoke/print-adhesion-smoke.xml" },
            @{ Name = "fill_smoke_tests"; Log = ".ci/smoke/fill-smoke.log"; Xml = ".ci/smoke/fill-smoke.xml" },
            @{ Name = "support_material_layers_smoke_tests [SupportMaterialLayers]"; Log = ".ci/smoke/support-material-layers-smoke.log"; Xml = ".ci/smoke/support-material-layers-smoke.xml" },
            @{ Name = "support_material_smoke_tests"; Log = ".ci/smoke/support-material-smoke.log"; Xml = ".ci/smoke/support-material-smoke.xml" },
            @{ Name = "trianglemesh_geometry_smoke_tests"; Log = ".ci/smoke/trianglemesh-geometry-smoke.log"; Xml = ".ci/smoke/trianglemesh-geometry-smoke.xml" }
          )

          $rows = New-Object System.Collections.Generic.List[string]
          $totalCases = 0
          $totalAssertions = 0
          $passedSuites = 0
          $eligibleSuites = 0

          foreach ($suite in $suiteMeta) {
            if ($suite.Name -like 'libslic3r_config_tests*' -and -not $configFastEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($configFastReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'placeholder_parser_smoke_tests*' -and -not $placeholderParserSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($placeholderParserSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'gcodewriter_smoke_tests*' -and -not $gcodewriterSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($gcodewriterSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'gcode_reader_smoke_tests*' -and -not $gcodeReaderSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($gcodeReaderSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'model_basic_smoke_tests*' -and -not $modelAssemblyEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($modelAssemblyReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'print_filament_mapping_smoke_tests*' -and -not $filamentMappingSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($filamentMappingSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'print_apply_validate_smoke_tests*' -and -not $applyValidateSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($applyValidateSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'print_perimeters_stage_smoke_tests*' -and -not $perimetersSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($perimetersSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'print_process_math_smoke_tests*' -and -not $processMathSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($processMathSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'print_process_core_smoke_tests*' -and -not $processCoreSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($processCoreSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'print_object_layers_smoke_tests*' -and -not $objectLayersSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($objectLayersSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'print_adhesion_smoke_tests*' -and -not $adhesionSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($adhesionSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'fill_smoke_tests*' -and -not $fillSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($fillSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'support_material_layers_smoke_tests*' -and -not $supportMaterialLayersSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($supportMaterialLayersSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'support_material_smoke_tests*' -and -not $supportMaterialSmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($supportMaterialSmokeReason) | 0 | 0 |")
              continue
            }
            if ($suite.Name -like 'trianglemesh_geometry_smoke_tests*' -and -not $trianglemeshGeometrySmokeEnabled) {
              $rows.Add("| $($suite.Name) | skipped ($trianglemeshGeometrySmokeReason) | 0 | 0 |")
              continue
            }

            $eligibleSuites += 1
            $cases = 0
            $assertions = 0
            if (Test-Path $suite.Log) {
              $logText = Get-Content $suite.Log -Raw
              if ($logText -match 'All tests passed \((?<assertions>\d+) assertion[s]? in (?<cases>\d+) test case[s]?\)') {
                $cases = [int]$matches.cases
                $assertions = [int]$matches.assertions
              }
            }

            if (($cases -eq 0 -or $assertions -eq 0) -and (Test-Path $suite.Xml)) {
              [xml]$xml = Get-Content $suite.Xml
              $suiteNode = $xml.testsuites.testsuite
              if ($suiteNode) {
                $cases = [int]$suiteNode.testcase.Count
              }
            }

            if ($cases -gt 0 -or $assertions -gt 0) {
              $passedSuites += 1
            }
            $totalCases += $cases
            $totalAssertions += $assertions
            $rows.Add("| $($suite.Name) | ran | $cases | $assertions |")
          }

          @"
          ## Cpp UT Smoke

          - Branch: `${{ needs.resolve-deps-run.outputs.branch-name }}`
          - Deps run id: `${{ needs.resolve-deps-run.outputs.run-id }}`
          - Changed files: `${{ steps.smoke_scope.outputs.changed }}`
          - Config fast gate enabled: `$configFastEnabled`
          - Config fast gate reason: `$configFastReason`
          - GCodeWriter smoke gate enabled: `$gcodewriterSmokeEnabled`
          - GCodeWriter smoke gate reason: `$gcodewriterSmokeReason`
          - GCodeReader smoke gate enabled: `$gcodeReaderSmokeEnabled`
          - GCodeReader smoke gate reason: `$gcodeReaderSmokeReason`
          - Model assembly smoke gate enabled: `$modelAssemblyEnabled`
          - Model assembly smoke gate reason: `$modelAssemblyReason`
          - Print filament mapping smoke gate enabled: `$filamentMappingSmokeEnabled`
          - Print filament mapping smoke gate reason: `$filamentMappingSmokeReason`
          - Print apply/validate smoke gate enabled: `$applyValidateSmokeEnabled`
          - Print apply/validate smoke gate reason: `$applyValidateSmokeReason`
          - Print perimeters smoke gate enabled: `$perimetersSmokeEnabled`
          - Print perimeters smoke gate reason: `$perimetersSmokeReason`
          - Print process math smoke gate enabled: `$processMathSmokeEnabled`
          - Print process math smoke gate reason: `$processMathSmokeReason`
          - Print process core smoke gate enabled: `$processCoreSmokeEnabled`
          - Print process core smoke gate reason: `$processCoreSmokeReason`
          - Print object layers smoke gate enabled: `$objectLayersSmokeEnabled`
          - Print object layers smoke gate reason: `$objectLayersSmokeReason`
          - Print adhesion smoke gate enabled: `$adhesionSmokeEnabled`
          - Print adhesion smoke gate reason: `$adhesionSmokeReason`
          - Fill smoke gate enabled: `$fillSmokeEnabled`
          - Fill smoke gate reason: `$fillSmokeReason`
          - Support material layers smoke gate enabled: `$supportMaterialLayersSmokeEnabled`
          - Support material layers smoke gate reason: `$supportMaterialLayersSmokeReason`
          - Support material smoke gate enabled: `$supportMaterialSmokeEnabled`
          - Support material smoke gate reason: `$supportMaterialSmokeReason`
          - TriangleMesh geometry smoke gate enabled: `$trianglemeshGeometrySmokeEnabled`
          - TriangleMesh geometry smoke gate reason: `$trianglemeshGeometrySmokeReason`
          - Smoke commands passed: `$passedSuites / $eligibleSuites`
          - Reported test cases: `$totalCases`
          - Reported assertions: `$totalAssertions`

          | Suite | Status | Test Cases | Assertions |
          | --- | --- | ---: | ---: |
          $($rows -join "`n")
          "@ | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
