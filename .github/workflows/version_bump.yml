name: Version Bump
run-name: "Bump ${{ inputs.custom || inputs.part }} — ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      part:
        description: 'Which part to bump'
        required: true
        type: choice
        options:
          - patch      # 02.07.00 → 02.07.01
          - minor      # 02.07.00 → 02.08.00
          - major      # 02.07.00 → 03.00.00
      custom:
        description: 'Custom base version (e.g. 02.08.00) — overrides part selection'
        required: false
        type: string

permissions: read-all

jobs:
  bump:
    name: Bump version.inc
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: |
            api.github.com:443
            github.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version
        id: current
        run: |
          set -euo pipefail
          BASE=$(grep 'set(SLIC3R_VERSION_BASE' version.inc | cut -d '"' -f2)
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "Current: $BASE"

      - name: Calculate new version
        id: new
        run: |
          set -euo pipefail
          BASE="${{ steps.current.outputs.base }}"
          CUSTOM="${{ inputs.custom }}"

          if [[ -n "$CUSTOM" ]]; then
            NEW_BASE="$CUSTOM"
          else
            IFS='.' read -r A B C <<< "$BASE"
            A=$((10#$A)); B=$((10#$B)); C=$((10#$C))
            case "${{ inputs.part }}" in
              major) A=$((A+1)); B=0; C=0 ;;
              minor) B=$((B+1)); C=0 ;;
              patch) C=$((C+1)) ;;
            esac
            NEW_BASE=$(printf "%02d.%02d.%02d" $A $B $C)
          fi

          echo "base=$NEW_BASE" >> "$GITHUB_OUTPUT"
          echo "New: $NEW_BASE"

      - name: Update version.inc
        run: |
          set -euo pipefail
          NEW_BASE="${{ steps.new.outputs.base }}"
          sed -i \
            "s/set(SLIC3R_VERSION_BASE \"[^\"]*\")/set(SLIC3R_VERSION_BASE \"${NEW_BASE}\")/" \
            version.inc
          grep 'SLIC3R_VERSION_BASE' version.inc

      - name: Commit and push
        run: |
          set -euo pipefail
          NEW_BASE="${{ steps.new.outputs.base }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.inc
          git commit -m "chore: bump version base to ${NEW_BASE}"
          git push

      - name: Summary
        run: |
          OLD_BASE="${{ steps.current.outputs.base }}"
          NEW_BASE="${{ steps.new.outputs.base }}"
          echo "## Version bumped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**${OLD_BASE}** → **${NEW_BASE}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Next release tag: \`v${NEW_BASE}.<commit-count>-dev\`" >> "$GITHUB_STEP_SUMMARY"
