name: Version Bump

on:
  workflow_dispatch:
    inputs:
      part:
        description: 'Which part to bump'
        required: true
        type: choice
        options:
          - fork       # bump FORK_RELEASE (e.g. fork.1 → fork.2)
          - patch      # bump upstream patch + reset fork to 1
          - minor      # bump upstream minor + reset fork to 1
          - major      # bump upstream major + reset fork to 1
      custom:
        description: 'Custom upstream version (e.g. 02.08.00.00) — overrides part selection (fork resets to 1)'
        required: false
        type: string

permissions: read-all

jobs:
  bump:
    name: Bump version.inc
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version
        id: current
        run: |
          VER=$(grep 'set(SLIC3R_VERSION' version.inc | cut -d '"' -f2)
          FORK=$(grep 'set(FORK_RELEASE' version.inc | cut -d '"' -f2)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "fork=$FORK" >> "$GITHUB_OUTPUT"
          echo "Current: ${VER}-fork.${FORK}"

      - name: Calculate new version
        id: new
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          FORK="${{ steps.current.outputs.fork }}"
          CUSTOM="${{ inputs.custom }}"

          if [[ -n "$CUSTOM" ]]; then
            NEW_VER="$CUSTOM"
            NEW_FORK=1
          else
            IFS='.' read -r A B C D <<< "$CURRENT"
            A=$((10#$A)); B=$((10#$B)); C=$((10#$C)); D=$((10#$D))
            case "${{ inputs.part }}" in
              major) A=$((A+1)); B=0; C=0; D=0; NEW_FORK=1 ;;
              minor) B=$((B+1)); C=0; D=0; NEW_FORK=1 ;;
              patch) D=$((D+1)); NEW_FORK=1 ;;
              fork)  NEW_FORK=$((10#$FORK+1)) ;;
            esac
            NEW_VER=$(printf "%02d.%02d.%02d.%02d" $A $B $C $D)
          fi

          echo "version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "fork=$NEW_FORK" >> "$GITHUB_OUTPUT"
          echo "New: ${NEW_VER}-fork.${NEW_FORK}"

      - name: Update version.inc
        run: |
          NEW_VER="${{ steps.new.outputs.version }}"
          NEW_FORK="${{ steps.new.outputs.fork }}"
          sed -i "s/set(SLIC3R_VERSION \"[^\"]*\")/set(SLIC3R_VERSION \"${NEW_VER}\")/" version.inc
          sed -i "s/set(FORK_RELEASE \"[^\"]*\")/set(FORK_RELEASE \"${NEW_FORK}\")/" version.inc
          grep -E 'SLIC3R_VERSION|FORK_RELEASE' version.inc

      - name: Commit and push
        run: |
          NEW_VER="${{ steps.new.outputs.version }}"
          NEW_FORK="${{ steps.new.outputs.fork }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.inc
          git commit -m "chore: bump version to ${NEW_VER}-fork.${NEW_FORK}"
          git push

      - name: Summary
        run: |
          OLD_VER="${{ steps.current.outputs.version }}"
          OLD_FORK="${{ steps.current.outputs.fork }}"
          NEW_VER="${{ steps.new.outputs.version }}"
          NEW_FORK="${{ steps.new.outputs.fork }}"
          echo "## Version bumped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**${OLD_VER}-fork.${OLD_FORK}** → **${NEW_VER}-fork.${NEW_FORK}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Trigger a release by pushing a tag:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "git tag v${NEW_VER}-fork.${NEW_FORK} && git push fork v${NEW_VER}-fork.${NEW_FORK}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
