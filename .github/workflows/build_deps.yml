on:
  workflow_call:
    inputs:
      cache-key:
        required: true
        type: string
      cache-path:
        required: true
        type: string
      valid-cache:
        required: true
        type: boolean
      os:
        required: true
        type: string
      arch:
        required: false
        type: string
      build-deps-only:
        required: false
        type: boolean

permissions: read-all
jobs:
  build_deps:
    name: Build Deps
    if: inputs.build-deps-only || inputs.valid-cache != true
    runs-on: ${{ inputs.os }}
    timeout-minutes: 240
    env:
      date:
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      # Setup the environment
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          lfs: 'true'

      - name: load cached deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ${{ inputs.cache-path }}
          key: ${{ inputs.cache-key }}

      - name: setup dev on Windows
        if: startsWith(inputs.os, 'windows-')
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57  # v3

      - name: Get the date on Ubuntu and macOS
        if: ${{ !startsWith(inputs.os, 'windows-') }}
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_ENV
        shell: bash

      - name: Get the date on Windows
        if: startsWith(inputs.os, 'windows-')
        run: echo "date=$(Get-Date -Format 'yyyyMMdd')" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
        shell: pwsh


      # Build Dependencies
      - name: Build on Windows
        if: startsWith(inputs.os, 'windows-')
        working-directory: ${{ github.workspace }}
        shell: pwsh
        env:
          INPUT_ARCH: ${{ inputs.arch }}
        run: |
            $vsArch = if ($env:INPUT_ARCH -eq "arm64") { "ARM64" } else { "x64" }
            choco install strawberryperl pkgconfiglite -y
            # Pin cmake to 3.31.x — CMake 4.x removed compatibility with
            # cmake_minimum_required(VERSION < 3.5) which breaks wxWidgets
            # cotire_test and other vendored subprojects.
            choco install cmake --version=3.31.6 --force --allow-downgrade -y
            $env:PATH = "C:\Program Files\CMake\bin;$env:PATH"
            New-Item -ItemType Directory -Force -Path "deps\build\BambuStudio_dep" | Out-Null
            Push-Location "deps\build"
            cmake ../ -G "Visual Studio 17 2022" -A $vsArch -DDESTDIR="./BambuStudio_dep" -DCMAKE_BUILD_TYPE=Release -DDEP_DEBUG=OFF
            msbuild /m ALL_BUILD.vcxproj
            Pop-Location

      - name: pack deps on Windows
        if: startsWith(inputs.os, 'windows-')
        working-directory: ${{ github.workspace }}
        shell: pwsh
        env:
          INPUT_OS: ${{ inputs.os }}
        run: |
          $os   = $env:INPUT_OS
          $date = "${{ env.date }}"
          Compress-Archive -Path "$env:GITHUB_WORKSPACE\deps\build\BambuStudio_dep\*" `
            -DestinationPath "$env:GITHUB_WORKSPACE\deps\build\BambuStudio_dep_${os}_${date}_vs2022.zip"

      - name: Fix python install error on mac
        if: inputs.os == 'macos-15-intel'
        working-directory: ${{ github.workspace }}
        run: |
          find /usr/local/bin -lname '*/Library/Frameworks/Python.framework/*' -delete
          sudo rm -rf /Library/Frameworks/Python.framework/
          brew install --force python3 && brew unlink python3 && brew link --overwrite python3

      - name: Free disk space
        if: inputs.os == 'macos-15' || inputs.os == 'macos-26'
        run: |
          df -h
          sudo find /Applications -maxdepth 1 -type d -name "Xcode_*.app" ! -name "Xcode_15.4.app" -exec rm -rf {} +
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches/*
          df -h

      - name: Install numpy for FFmpeg on macOS ARM
        if: inputs.os == 'macos-15' || inputs.os == 'macos-26'
        run: |
          # FFmpeg's configure uses numpy.distutils, removed in numpy 2.0 AND
          # broken on Python 3.13+ (distutils removed from stdlib in Python 3.12).
          # Use Python 3.12 explicitly — the last version with working numpy.distutils.
          brew install python@3.12
          /opt/homebrew/opt/python@3.12/bin/pip3.12 install "numpy==1.26.4" --break-system-packages
          /opt/homebrew/opt/python@3.12/bin/python3.12 -c "import numpy; import numpy.distutils"
          echo "/opt/homebrew/opt/python@3.12/bin" >> "$GITHUB_PATH"

      - name: Build on Mac x86_64
        if: startsWith(inputs.os, 'macos-') && inputs.arch == 'x86_64'
        working-directory: ${{ github.workspace }}
        run: |
            brew install automake texinfo nasm yasm x264
            brew uninstall --ignore-dependencies zstd
            brew unlink cmake || true
            brew tap-new $USER/old-cmake || true
            brew extract --version=3.31.0 cmake $USER/old-cmake
            brew install $USER/old-cmake/cmake@3.31.0
            brew link --overwrite cmake@3.31.0
            brew pin cmake@3.31.0
            ./BuildMac.sh -d -x -a x86_64 -t 10.15 -1
            (cd "${{ github.workspace }}/deps/build/x86_64" && \
            find . -mindepth 1 -maxdepth 1 ! -name 'BambuStudio_deps' -exec rm -rf {} +)
            brew install zstd

      - name: Build on Mac universal (arm64 + x86_64)
        if: startsWith(inputs.os, 'macos-') && inputs.arch != 'x86_64'
        working-directory: ${{ github.workspace }}
        run: |
            brew install automake texinfo nasm yasm x264
            brew uninstall --ignore-dependencies zstd
            brew unlink cmake || true
            brew tap-new $USER/old-cmake || true
            brew extract --version=3.31.0 cmake $USER/old-cmake
            brew install $USER/old-cmake/cmake@3.31.0
            brew link --overwrite cmake@3.31.0
            brew pin cmake@3.31.0
            ./BuildMac.sh -d -x -a universal -t 10.15 -1
            for arch in arm64 x86_64; do
                (cd "${{ github.workspace }}/deps/build/${arch}" && \
                find . -mindepth 1 -maxdepth 1 ! -name 'BambuStudio_deps' -exec rm -rf {} +)
            done
            brew install zstd

      - name: pack deps on Macos
        if: startsWith(inputs.os, 'macos-')
        working-directory: ${{ github.workspace }}
        run: |
          cd ${{ github.workspace }}/deps
          tar -zcvf "BambuStudio_dep_mac_${{ inputs.arch }}_$(date +"%Y%m%d").tar.gz" build


      - name: Build on Ubuntu
        if: startsWith(inputs.os, 'ubuntu-')
        working-directory: ${{ github.workspace }}
        run: |
            sudo ./BuildLinux.sh -ur
            sudo chown $USER -R ./
            ./BuildLinux.sh -dfr
            cd deps/build
            tar -czvf BambuStudio_dep_${{ inputs.os }}_$(date +"%Y%m%d").tar.gz destdir

      # Upload Artifacts
      - name: Upload Mac ${{ inputs.arch }} artifacts
        if: startsWith(inputs.os, 'macos-')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_dep_${{ inputs.os }}_${{ inputs.arch }}_${{ env.date }}
          path: ${{ github.workspace }}/deps/BambuStudio_dep_mac_${{ inputs.arch }}*.tar.gz

      - name: clean artifacts
        if: startsWith(inputs.os, 'macos-')
        working-directory: ${{ github.workspace }}
        run: rm -rf ${{ github.workspace }}/deps/build/BambuStudio_dep_mac_${{ inputs.arch }}*.tar.gz

      - name: Upload Windows artifacts
        if: startsWith(inputs.os, 'windows-')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_dep_${{ inputs.os }}_${{ env.date }}
          path: ${{ github.workspace }}/deps/build/BambuStudio_dep*.zip

      - name: Upload Ubuntu artifacts
        if: ${{ ! env.ACT && startsWith(inputs.os, 'ubuntu-') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_dep_${{ inputs.os }}_${{ env.date }}
          path: ${{ github.workspace }}/deps/build/BambuStudio_dep_${{ inputs.os }}_*.tar.gz

  build_Bambu:
    name: Build BambuStudio
    needs: [build_deps]
    if: ${{ !cancelled() && !inputs.build-deps-only && (inputs.valid-cache == true && needs.build_deps.result == 'skipped') || (inputs.valid-cache != true && success()) }}
    uses: ./.github/workflows/build_bambu.yml
    with:
      cache-key:  ${{ inputs.cache-key }}
      cache-path: ${{ inputs.cache-path }}
      os:         ${{ inputs.os }}
      arch:       ${{ inputs.arch }}
    secrets: inherit
