name: OpenSSF Scorecard

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          # audit instead of block: scorecard-action runs in a Docker container
          # whose DNS (UDP) is blocked by egress-policy:block even for listed
          # endpoints, causing Fuzzing/Vulnerabilities/CII-Best-Practices checks
          # to fail with "operation not permitted" on DNS lookups.
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4.35.5
        with:
          sarif_file: results.sarif
