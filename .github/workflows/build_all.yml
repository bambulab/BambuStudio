name: Build all

on:
  push:
    branches:
     - master
    paths:
     - 'deps/**'
     - 'src/**'
     - '**/CMakeLists.txt'
     - 'version.inc'
     - 'bbl/**'
     - 'resources/**'
     - ".github/workflows/build_*.yml"

  pull_request:
    branches:
     - master
    paths:
     - 'deps/**'
     - 'src/**'
     - '**/CMakeLists.txt'
     - 'version.inc'
     - ".github/workflows/build_*.yml"
     - 'BuildLinux.sh'
     - 'build_win.bat'
    
  workflow_dispatch: # manual dispatch
      inputs:
        build-deps-only:
            description: 'Only build dependencies (bypasses caching)'
            type: boolean
            default: false

permissions: read-all
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build_all:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux / Ubuntu 22.04
          - os: ubuntu-24.04
            name: Linux / Ubuntu 24.04
          - os: ubuntu-24.04-arm
            name: Linux / Ubuntu 24.04 ARM
          - os: windows-2022
            name: Windows / Windows 2022
          - os: macos-15-intel
            arch: x86_64
            name: macOS / macOS 15 Intel
          - os: macos-15
            arch: arm64
            name: macOS / macOS 15 ARM
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build-deps-only: ${{ inputs.build-deps-only || false }}
    secrets: inherit

  # GitHub-hosted builds inside distribution containers
  build_packages_container:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    container: ${{ matrix.container }}
    permissions: read-all
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / Debian trixie .deb
            container: debian:trixie@sha256:4ae67669760b807c19f23902a3fd7c121a6a70cf2ae709035674b23e712e4d62
            pkg_cmd: ./BuildLinux.sh -pr
            artifact_suffix: debian-trixie_deb
            artifact_glob: ./build/bambustudio_*.deb

          - name: Linux / Fedora 44 .rpm
            container: fedora:44@sha256:f717d3f59ea0dc45d3c024c9477e786bab7d418d26636920d17b48016f1e69ca
            pkg_cmd: bash scripts/build_rpm.sh
            artifact_suffix: fedora44_rpm
            artifact_glob: ./build/bambustudio-*.rpm

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Bootstrap (Debian)
        if: startsWith(matrix.container, 'debian:trixie')
        run: apt-get update -qq && apt-get install -y sudo git curl git-lfs

      - name: Bootstrap (Fedora)
        if: startsWith(matrix.container, 'fedora:44')
        run: dnf install -y sudo git curl git-lfs

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          lfs: 'true'

      - name: Cache deps
        id: cache-deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: deps/build/destdir
          key: pkg-deps-${{ matrix.artifact_suffix }}-${{ hashFiles('deps/**') }}

      - name: Install build dependencies
        run: sudo ./BuildLinux.sh -ur

      - name: Fix permissions
        run: chown -R "$(id -u):$(id -g)" ./

      - name: Build deps
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: ./BuildLinux.sh -dfr

      - name: Build BambuStudio
        run: |
          ./BuildLinux.sh -sfr
          cd build && ./src/BuildLinuxImage.sh

      - name: Build package
        run: ${{ matrix.pkg_cmd }}

      - name: Get version
        id: ver
        shell: bash
        run: |
          ver=$(grep 'set(SLIC3R_VERSION' version.inc | cut -d '"' -f2)
          echo "ver=V${ver}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_${{ matrix.artifact_suffix }}_${{ steps.ver.outputs.ver }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

  # Self-hosted distro runner builds (AppImage + native package)
  build_packages_selfhosted:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    permissions: read-all
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: Linux / Ubuntu 22.04 AppImage + .deb
            runner: [self-hosted, pve05-ubuntu22]
            pkg_cmd: ./BuildLinux.sh -pr
            artifact_suffix: ubuntu2204
            artifact_deb: ./build/bambustudio_*.deb

          - name: Linux / Ubuntu 24.04 AppImage + .deb
            runner: [self-hosted, pve05-ubuntu24]
            pkg_cmd: ./BuildLinux.sh -pr
            artifact_suffix: ubuntu2404
            artifact_deb: ./build/bambustudio_*.deb

          - name: Linux / openSUSE Tumbleweed
            runner: [self-hosted, pve05-opensuse]
            pkg_cmd: bash scripts/build_rpm.sh
            artifact_suffix: opensuse-tumbleweed
            artifact_pkg: ./build/bambustudio-*.rpm

          - name: Linux / Arch Linux
            runner: [self-hosted, pve05-arch]
            pkg_cmd: bash scripts/build_pkg_arch.sh
            artifact_suffix: arch
            artifact_pkg: ./build/bambustudio-*.pkg.tar.zst

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          lfs: 'true'

      - name: Cache deps
        id: cache-deps
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: deps/build/destdir
          key: pkg-deps-${{ matrix.artifact_suffix }}-${{ hashFiles('deps/**') }}

      - name: Install build dependencies
        run: sudo ./BuildLinux.sh -ur

      - name: Fix permissions
        run: sudo chown "$(id -u):$(id -g)" -R ./

      - name: Build deps
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: ./BuildLinux.sh -dfr

      - name: Build BambuStudio + AppImage
        run: |
          ./BuildLinux.sh -isfr
          ARCH=$(uname -m)
          ver=$(grep 'set(SLIC3R_VERSION' version.inc | cut -d '"' -f2)
          mv -n ./build/BambuStudio_ubu64.AppImage \
            "./build/BambuStudio_${{ matrix.artifact_suffix }}_V${ver}.AppImage" 2>/dev/null || true

      - name: Build package
        run: ${{ matrix.pkg_cmd }}

      - name: Get version
        id: ver
        run: |
          ver=$(grep 'set(SLIC3R_VERSION' version.inc | cut -d '"' -f2)
          echo "ver=V${ver}" >> "$GITHUB_OUTPUT"

      - name: Upload AppImage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_${{ matrix.artifact_suffix }}_appimage_${{ steps.ver.outputs.ver }}
          path: ./build/BambuStudio_${{ matrix.artifact_suffix }}_${{ steps.ver.outputs.ver }}.AppImage
          if-no-files-found: warn
          retention-days: 14

      - name: Upload .deb package
        if: matrix.artifact_deb != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_${{ matrix.artifact_suffix }}_deb_${{ steps.ver.outputs.ver }}
          path: ${{ matrix.artifact_deb }}
          if-no-files-found: warn
          retention-days: 14

      - name: Upload native package
        if: matrix.artifact_pkg != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: BambuStudio_${{ matrix.artifact_suffix }}_pkg_${{ steps.ver.outputs.ver }}
          path: ${{ matrix.artifact_pkg }}
          if-no-files-found: warn
          retention-days: 14
