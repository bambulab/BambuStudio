name: Build all
run-name: "Build all — ${{ github.actor }}"

on:
  push:
    branches:
      - main
      - 'release/*'
    paths:
      - 'deps/**'
      - 'src/**'
      - '**/CMakeLists.txt'
      - 'version.inc'
      - 'localization/**'
      - 'resources/**'
      - '.github/workflows/build_*.yml'
      - 'scripts/flatpak/**'

  pull_request:
    branches:
      - main
      - 'release/*'
    paths:
      - 'deps/**'
      - 'deps_src/**'
      - 'src/**'
      - '**/CMakeLists.txt'
      - 'version.inc'
      - '.github/workflows/build_*.yml'
      - 'build_linux.sh'
      - 'build_win.bat'
      - 'BuildMac.sh'
      - 'scripts/flatpak/**'

  workflow_dispatch:
    inputs:
      build-deps-only:
        description: 'Only build dependencies (bypasses caching)'
        type: boolean
        default: false

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Linux ──────────────────────────────────────────────────────────────────
  build_linux:
    name: Linux / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-24.04-arm
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os:              ${{ matrix.os }}
      build-deps-only: ${{ inputs.build-deps-only || false }}
    secrets: inherit

  # ── Windows ────────────────────────────────────────────────────────────────
  build_windows:
    name: Windows / ${{ matrix.os }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            arch: x64
          - os: windows-11-arm
            arch: arm64
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os:              ${{ matrix.os }}
      arch:            ${{ matrix.arch }}
      build-deps-only: ${{ inputs.build-deps-only || false }}
    secrets: inherit

  # ── macOS ──────────────────────────────────────────────────────────────────
  build_macos_intel:
    name: macOS / Intel (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15-intel
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os:              ${{ matrix.os }}
      arch:            x86_64
      build-deps-only: ${{ inputs.build-deps-only || false }}
    secrets: inherit

  build_macos_arm:
    name: macOS / ARM Universal (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - macos-26
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os:              ${{ matrix.os }}
      arch:            universal
      build-deps-only: ${{ inputs.build-deps-only || false }}
    secrets: inherit

  # ── Distribution packages (Debian .deb, Fedora .rpm) ──────────────────────
  build_packages:
    name: Build distribution packages
    needs: build_linux
    if: ${{ !cancelled() && needs.build_linux.result != 'failure' }}
    uses: ./.github/workflows/build_packages.yml
    secrets: inherit
