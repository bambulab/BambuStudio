name: Build all
run-name: "Build all — ${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      build-deps-only:
        description: 'Only build dependencies (bypasses caching)'
        type: boolean
        default: false

permissions: read-all
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── GitHub-hosted platform matrix (Ubuntu AppImage, Windows, macOS) ───────
  build_platforms:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux / Ubuntu 22.04
          - os: ubuntu-24.04
            name: Linux / Ubuntu 24.04
          - os: ubuntu-24.04-arm
            name: Linux / Ubuntu 24.04 ARM
          - os: windows-2022
            name: Windows / Windows 2022
          - os: macos-15-intel
            arch: x86_64
            name: macOS / macOS 15 Intel
          - os: macos-15
            arch: arm64
            name: macOS / macOS 15 ARM
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build-deps-only: ${{ inputs.build-deps-only || false }}
    secrets: inherit

  # ── Distribution packages (Debian .deb, Fedora .rpm, self-hosted) ─────────
  build_packages:
    name: Build distribution packages
    uses: ./.github/workflows/build_packages.yml
    secrets: inherit
