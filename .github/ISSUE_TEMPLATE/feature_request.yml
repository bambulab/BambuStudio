name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please search existing issues and discussions before submitting to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why do you need it?
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought of?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the application does this affect?
      options:
        - Slicing engine
        - User interface
        - Networking / printer connection
        - Filament profiles
        - Packaging / installation
        - Build system / CI
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, or links to similar features in other slicers.
    validations:
      required: false
