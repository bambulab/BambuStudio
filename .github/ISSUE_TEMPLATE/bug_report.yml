name: Bug Report
description: Report something that is not working correctly
labels: ["bug", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please **search existing issues** to avoid duplicates. If one exists, comment there instead.

  - type: input
    id: version
    attributes:
      label: BambuStudio Version
      description: Found in `Help` → `About Bambu Studio`
      placeholder: e.g. 02.07.00.55
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Where did you get this build?
      options:
        - BenJule/BambuStudio GitHub releases
        - Built from source
        - Bambu Lab official release
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Operating System
      options:
        - Linux
        - Windows
        - macOS
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS Version
      placeholder: e.g. Ubuntu 24.04, Windows 11, macOS 14.5
    validations:
      required: true

  - type: input
    id: printer
    attributes:
      label: Printer model
      placeholder: e.g. Bambu Lab X1C, P1S, A1 Mini
    validations:
      required: false

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Screenshots or screen recordings are very helpful.
    validations:
      required: true

  - type: textarea
    id: system_info
    attributes:
      label: System information (optional)
      placeholder: |
        GPU: NVIDIA RTX 3080 / AMD RX 6700 XT / Intel Iris Xe
        RAM: 16 GB
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ### Log file location
        - **Windows:** `%APPDATA%\BambuStudio\log`
        - **macOS:** `~/Library/Application Support/BambuStudio/log`
        - **Linux:** `~/.config/BambuStudio/log`

        Or: `Help` → `Show Configuration Folder`

  - type: textarea
    id: logs
    attributes:
      label: Log file & project file
      description: Drop a ZIP of the log directory and/or the exported project file (`.3mf` zipped) here.
      placeholder: Drag & drop files here
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Attachments checklist
      options:
        - label: Log file attached
        - label: Project file attached (if applicable)
