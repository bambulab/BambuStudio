name-template: 'BambuStudio v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'New Features'
    labels: ['enhancement']
  - title: 'Bug Fixes'
    labels: ['bug', 'crash', 'regression']
  - title: 'Performance'
    labels: ['performance']
  - title: 'Security'
    labels: ['security']
  - title: 'Build / CI'
    labels: ['area: build', 'area: ci', 'area: packaging']
  - title: 'Dependencies'
    labels: ['dependencies', 'javascript']
  - title: 'Documentation'
    labels: ['documentation']

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: ['major']
  minor:
    labels: ['enhancement']
  patch:
    labels: ['bug', 'crash', 'regression', 'security', 'dependencies']
  default: patch

exclude-labels:
  - 'wontfix'
  - 'duplicate'
  - 'invalid'

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: $PREVIOUS_TAG...v$RESOLVED_VERSION
