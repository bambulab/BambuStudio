<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="max-age=0" />
<title>引导_P1</title>
<link rel="stylesheet" type="text/css" href="../css/common.css" />	
<link rel="stylesheet" type="text/css" href="6.css" />
<script type="text/javascript" src="../js/jquery-2.1.1.min.js"></script>
<script type="text/javascript" src="../js/common.js"></script>
<script type="text/javascript">
function BeginLogin()
{
	var tSend={};
	tSend['sequence_id']=Math.round(new Date() / 1000);
	tSend['command']="user_login";
	tSend['data']={};
	tSend['data']['action']="login";
	tSend['data']['user_id']="11223344";
	tSend['data']['user_name']="xxxxxxx";
	tSend['data']['token']="xxxxxxxxxxx";
	
	SendWXMessage( JSON.stringify(tSend) );		
}
</script>
</head>
<body >
<div id="Title">
	<div>User Login</div>
</div>
<div id="Content">
<div id="InputArea">
<div class="TextLine">
	<a class="TextTag">用户名：</a><input type="text"></input>		
</div>
<div class="TextLine">
	<a class="TextTag">密码：</a><input type="text"></input>		
</div>
</div>
</div>
<div id="AcceptArea">
	<div class="NormalBtn" id="AcceptBtn"  onclick="BeginLogin()">登录</div>
</div>
</body>
</html>
