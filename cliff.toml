[changelog]
header = """
# Changelog

All notable changes to BambuStudio are documented here.
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.breaking %} (**BREAKING**){% endif %} \
([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/BenJule/BambuStudio/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
  { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/BenJule/BambuStudio/pull/${1}))" },
]
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^doc|^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore|^ci|^build", group = "CI / Build" },
  { message = "^style", skip = true },
  { message = "^revert", group = "Reverts" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "^v[0-9].*"
skip_tags = "nightly-.*|-rc\\."
ignore_tags = ""
topo_order = false
sort_commits = "newest"
